<div id="tb"><div id="tbt">🔥 TERMODINÁMICA</div><div id="po"><div id="pi"></div></div><div id="ptx">0%</div><button id="mbtn" onclick="tSB()">☰ Índice</button></div>

<script>
// ── AUDIO ──
let _ac;
function AC(){if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();return _ac;}
function snd(t){try{const a=AC();if(t==='tick'){const o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=800;g.gain.setValueAtTime(.07,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.06);o.start();o.stop(a.currentTime+.07);return;}({ok:[523,659,784],bad:[220,180],win:[523,659,784,1047],lose:[300,250,200]}[t]||[440]).forEach((f,i)=>{const o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=f;g.gain.setValueAtTime(.18,a.currentTime+i*.12);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+i*.12+.25);o.start(a.currentTime+i*.12);o.stop(a.currentTime+i*.12+.28);});}catch(e){}}
// ── SHUFFLE ──
function shuf(a){let r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
function shufQ(qs){return shuf(qs).map(q=>{const ops=q.o.map((t,i)=>({t,c:i===q.a}));const sh=shuf(ops);return{...q,o:sh.map(x=>x.t),a:sh.findIndex(x=>x.c)};});}
// ── SCREENS ENGINE ──
const SS=[];let ci=0;
function addS(id,lb,ic,gr,html,fn){SS.push({id,lb,ic,gr,html,fn:fn||null,done:false});}
// ── SVG MAPA BUILDER ──
function mkM(ns,ls){
  let sl='',sn='',st='';
  ls.forEach(l=>{const a=ns[l[0]],b=ns[l[1]];sl+=`<line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" stroke="rgba(255,255,255,.18)" stroke-width="1.5"/>`;});
  ns.forEach(n=>{
    const c=n.c||'#232345',bc=n.bc||'rgba(255,255,255,.18)',tc=n.tc||'#F0F0FF',w=n.w||90,fs=n.fs||8.5;
    sn+=`<rect x="${n.x-w/2}" y="${n.y-14}" width="${w}" height="28" rx="7" fill="${c}" stroke="${bc}" stroke-width="1.5"/>`;
    const ws=n.t.split('|');
    if(ws.length===1){st+=`<text x="${n.x}" y="${n.y+4}" text-anchor="middle" fill="${tc}" font-size="${fs}" font-family="Nunito,sans-serif" font-weight="800">${ws[0]}</text>`;}
    else{st+=`<text x="${n.x}" y="${n.y-2}" text-anchor="middle" fill="${tc}" font-size="${fs-.5}" font-family="Nunito,sans-serif" font-weight="800">${ws[0]}</text><text x="${n.x}" y="${n.y+9}" text-anchor="middle" fill="${tc}" font-size="${fs-.5}" font-family="Nunito,sans-serif" font-weight="800">${ws[1]}</text>`;}
  });
  return `<svg viewBox="0 0 400 200" style="width:100%;max-height:100%;" xmlns="http://www.w3.org/2000/svg"><rect width="400" height="200" fill="#141428" rx="10"/>${sl}${sn}${st}</svg>`;
}

  <p class="hp">Aprende con situaciones reales de tu vida cotidiana.<br>Sin fórmulas — solo procesos, comprensión y análisis.</p>

</div>
<div class="mgrid">
  <div class="mcard" onclick="goTo('s03')"><div class="mi">🌡️</div><div class="mt">Tema 1</div><div class="mc">Calor y Temperatura</div></div>

</div>
<div class="ib">💡 Usa <strong>Siguiente →</strong> para avanzar pantalla a pantalla, o <strong>☰ Índice</strong> para ir directamente a cualquier sección.</div>`);

addS('s02','¿Qué es la Termodinámica?','🌡️','Inicio',`
<div class="sh"><div class="stit">¿Qué es la Termodinámica?</div><div class="ssub">Presaberes — lo que ya vives sin saber que es física</div></div>
<div class="ib">🤔 <strong>Piensa en esto:</strong> Cuando tu mamá pone el agua a hervir para el tinto, cuando te duchas con agua tibia, cuando el piso frío de cerámica te despierta al saltar de la cama, cuando el refresco de la nevera se calienta en la mesa... todo eso es termodinámica.</div>
<div class="two">
<div class="cc cf"><h3>🔥 ¿Qué estudia?</h3><p>Cómo el <strong>calor</strong> se mueve entre los cuerpos, cómo cambia la <strong>temperatura</strong>, y por qué los materiales cambian de tamaño o estado al calentarse o enfriarse.</p></div>
<div class="cc ci"><h3>🎯 En el ICFES</h3><p>No te piden hacer cuentas. Te dan una <strong>situación real</strong> y debes <strong>explicar el proceso</strong> físico que ocurre. Eso es exactamente lo que aprenderás aquí.</p></div>
</div>
<div class="cc cg"><h3>✦ Lo que aprenderás a explicar con seguridad</h3>
<div class="ex">¿Por qué el mango de madera de la olla no quema aunque la olla sí esté hirviendo?</div>
<div class="ex">¿Por qué el sudor refresca el cuerpo aunque el ambiente esté caliente?</div>
<div class="ex">¿Por qué las llantas del carro tienen más presión al mediodía que en la madrugada?</div>
<div class="ex">¿Por qué en Bogotá la comida tarda más en cocinarse que en Barranquilla?</div></div>`);

addS('s03','Calor y Temperatura','🌡️','Tema 1 · Calor y Temperatura',`
<div class="sh"><div class="stit">Calor y Temperatura</div><div class="ssub">¿Son lo mismo? Se usan igual en el lenguaje diario, pero en física son conceptos completamente distintos</div></div>
<div class="two">
<div class="cc cf"><h3>🌡️ Temperatura</h3><p>Es la medida de qué tan agitadas están las moléculas de un cuerpo. A mayor agitación molecular → mayor temperatura. No es la cantidad de calor que tiene un cuerpo — es su estado de agitación.</p>
<div class="ex">🏠 El termómetro bajo tu axila mide la agitación de las moléculas de tu cuerpo. Fiebre = moléculas vibrando más rápido de lo normal.</div>
<div class="ex">🌡️ "Cúcuta, 38°C hoy" — el noticiero reporta la agitación de las moléculas del aire en esa ciudad.</div></div>
<div class="cc ci"><h3>🔥 Calor</h3><p>Es energía que se está <strong>moviendo</strong> de un cuerpo a otro. Siempre viaja del cuerpo de mayor temperatura al de menor. Nunca al revés por sí solo.</p>
<div class="ex">🏠 Al tocar la estufa caliente, el calor viaja de la estufa (alta T) hacia tu mano (menor T). Por eso sientes calor.</div>
<div class="ex">🧊 Al tocar hielo, el calor de tu mano (37°C) viaja hacia el hielo (0°C). Tu mano pierde calor — por eso se siente fría.</div>
<div class="ex">☕ El tinto caliente en la mesa cede calor al ambiente hasta que ambos quedan a la misma temperatura.</div></div>
</div>
<div class="wb">⚠️ <strong>Error muy común:</strong> "El frío del hielo pasó al agua caliente." Eso es incorrecto. El <strong>frío no fluye</strong>. Lo que fluye siempre es el <strong>calor</strong>, del cuerpo caliente al frío. El hielo no manda frío — recibe calor del agua.</div>`);

addS('s04','Calor y Temperatura — análisis','🌡️','Tema 1 · Calor y Temperatura',`
<div class="sh"><div class="stit">Calor y Temperatura — análisis profundo</div><div class="ssub">Situaciones que generan confusión y cómo entenderlas correctamente</div></div>
<div class="cc cp"><h3>🤝 El equilibrio térmico</h3><p>Cuando dos cuerpos con diferente temperatura se tocan, el calor fluye del más caliente al más frío hasta que <strong>ambos quedan a la misma temperatura</strong>. Ese estado se llama equilibrio térmico y el flujo de calor se detiene.</p>
<div class="ex">🥤 Refresco de la nevera (4°C) en la mesa (26°C): el calor del ambiente pasa al refresco hasta que ambos están a 26°C — equilibrio térmico. Por eso ya no está frío.</div>
<div class="ex">🚿 Mezclas agua caliente y fría para ducharte: el calor del agua caliente pasa a la fría hasta que toda queda a la misma temperatura.</div></div>
<div class="cc cy"><h3>🔍 ¿Por qué el metal se siente más frío que la madera a igual temperatura?</h3><p>Una cuchara de metal y un mango de madera llevan toda la noche en el mismo cajón — exactamente a la misma temperatura. Al tocarlos, el metal se siente mucho más frío.</p>
<div class="hl">El metal es buen conductor — extrae calor de tu mano muy rápidamente. Esa pérdida veloz de calor es lo que tu cerebro interpreta como "frío intenso". La madera conduce mal — extrae calor despacio, por eso se siente tibio. Misma temperatura, diferente conductividad.</div>
<div class="ex">🏠 Por eso los mangos de ollas son de madera o plástico: no están más fríos que el metal — simplemente no transmiten el calor de la olla hacia tu mano tan rápido.</div></div>
<div class="cc cg"><h3>🌡️ Cómo funciona el termómetro</h3><p>Al ponerlo bajo el brazo, el termómetro y el cuerpo intercambian calor hasta el equilibrio térmico. Cuando el mercurio deja de subir, ambos están a la misma temperatura — en ese punto la lectura es exacta.</p>
<div class="ex">🏠 Por eso hay que esperar al menos 3 minutos. Antes de ese punto el termómetro aún está alcanzando el equilibrio — la lectura sería incorrecta.</div></div>`);

// ══ PANTALLAS 9-13: CALOR ESPECÍFICO ══
addS('s09','¿Cómo el calor cambia la temperatura?','🌡️','Tema 1 · Calor y Temperatura',`
<div class="sh"><div class="stit">¿Cómo el calor cambia la temperatura?</div><div class="ssub">La misma cantidad de calor puede calentar muy diferente según el material y la cantidad</div></div>
<div class="cc cf"><h3>🔬 La relación fundamental — sin fórmula</h3><p>Cuando le das calor a una sustancia, su temperatura sube. Pero la cantidad de calor necesaria depende de dos factores: <strong>cuánto material hay</strong> (la masa) y <strong>qué tipo de material es</strong> (su "resistencia" a calentarse, llamada calor específico).</p>
<div class="hl">✦ <strong>Más masa → más calor necesario</strong> para la misma subida de temperatura.<br>✦ <strong>Mayor calor específico → más difícil de calentar</strong>: necesita mucho calor para subir poco la temperatura.</div></div>
<div class="two">
<div class="cc ci"><h3>💧 El agua — difícil de calentar</h3><p style="font-size:11.5px;">El agua tiene calor específico muy alto — necesita muchísimo calor para subir su temperatura. Eso también significa que es difícil de enfriar.</p>
<div class="ex">🏠 Una olla grande de agua tarda mucho más en hervir que una pequeña con el mismo fogón — más masa, más calor necesario.</div>
<div class="ex">🍳 Una sartén de hierro vacía se calienta en segundos con el fogón. Una olla llena de agua con el mismo fogón tarda minutos. El hierro tiene calor específico mucho más bajo que el agua.</div></div>
<div class="cc cg"><h3>🔩 Los metales — fáciles de calentar</h3><p style="font-size:11.5px;">Los metales tienen calor específico muy bajo — se calientan rápido con poco calor y se enfrían rápido también.</p>
<div class="ex">☕ Un pocillo de tinto en metal se enfría mucho más rápido que en cerámica, aunque los dos tengan el mismo café a la misma temperatura. El metal transfiere calor al ambiente más velozmente.</div>
<div class="ex">⚠️ Las sartenes vacías en el fogón se calientan peligrosamente rápido. No las dejes solas en el fuego — su bajo calor específico hace que suban de temperatura muy rápido.</div></div>
</div>`);

addS('s10','El calor específico en el entorno regional','🌡️','Tema 1 · Calor y Temperatura',`
<div class="sh"><div class="stit">El calor específico en tu entorno</div><div class="ssub">Cómo esta propiedad explica fenómenos del norte de Santander y Colombia</div></div>
<div class="cc cy"><h3>🌊 Los ríos regulan el clima regional</h3><p>El río Zulia, el Pamplonita, el Catatumbo — todos los ríos y cuerpos de agua tienen un efecto regulador sobre el clima local, gracias al alto calor específico del agua.</p>
<div class="ex">🌿 En los días más calurosos los ríos absorben calor del ambiente sin calentarse demasiado. En noches frías lo liberan lentamente, manteniendo más tibio el entorno. Por eso cerca de los ríos el clima es diferente que lejos de ellos.</div></div>
<div class="cc cf"><h3>🏖️ La playa: arena vs mar con el mismo sol</h3><p>La arena quema los pies al mediodía pero el mar está fresco, aunque los dos recibieron el mismo sol toda la mañana.</p>
<div class="hl">La arena tiene calor específico bajo — sube mucho de temperatura con poco calor. El agua del mar tiene calor específico alto — necesita mucho más calor para subir apenas un grado. Por eso la arena quema y el mar está fresco.</div></div>
<div class="cc ci"><h3>🧍 El cuerpo humano y el agua</h3><p>El cuerpo humano es aproximadamente 60% agua. Eso tiene una ventaja enorme: nuestra temperatura corporal es muy estable precisamente porque el agua resiste los cambios de temperatura.</p>
<div class="ex">🏃 Después de hacer ejercicio bajo el sol de Cúcuta, el cuerpo puede acumular mucho calor sin que la temperatura suba dramáticamente — el agua de los tejidos "absorbe" ese calor. El mecanismo del sudor luego descarga ese calor acumulado.</div></div>`);

// ══ PANTALLAS 14-18: EQUILIBRIO TÉRMICO ══
addS('s14','El equilibrio térmico — proceso','🌡️','Tema 1 · Calor y Temperatura',`
<div class="sh"><div class="stit">El equilibrio térmico</div><div class="ssub">El proceso natural que ocurre cada vez que dos cuerpos a diferente temperatura se ponen en contacto</div></div>
<div class="stp"><div class="snum" style="background:rgba(255,77,0,.3);color:var(--f);">1</div><div><div class="stit2">El calor empieza a fluir inmediatamente</div><div class="sdesc">En el instante en que los dos cuerpos se tocan, el calor fluye del de mayor temperatura al de menor. Esto ocurre siempre, sin excepción — es una ley de la naturaleza.</div></div></div>
<div class="stp"><div class="snum" style="background:rgba(255,140,0,.3);color:var(--f2);">2</div><div><div class="stit2">Las temperaturas se van igualando</div><div class="sdesc">El cuerpo caliente pierde temperatura mientras cede calor. El cuerpo frío gana temperatura mientras recibe calor. El proceso continúa mientras haya diferencia de temperatura entre ellos.</div></div></div>
<div class="stp"><div class="snum" style="background:rgba(6,214,160,.3);color:var(--gn);">3</div><div><div class="stit2">Equilibrio térmico — el flujo se detiene</div><div class="sdesc">Cuando ambos cuerpos alcanzan la misma temperatura, el flujo de calor se detiene completamente. No hay diferencia de temperatura que lo impulse. A ese estado final se le llama equilibrio térmico.</div></div></div>
<div class="ib">🌡️ <strong>El termómetro funciona exactamente así:</strong> Al ponerlo bajo el brazo, el termómetro (frío) y el cuerpo (37°C) intercambian calor. Cuando el mercurio deja de subir, alcanzaron el equilibrio térmico. En ese punto el termómetro marca la temperatura exacta del cuerpo.
<br><br>⏱️ Por eso hay que esperar 3 minutos. Antes de ese punto el termómetro aún está ganando temperatura — la lectura sería menor que la real.</div>`);

addS('s15','El equilibrio térmico — ejemplos','🌡️','Tema 1 · Calor y Temperatura',`
<div class="sh"><div class="stit">El equilibrio térmico en tu vida cotidiana</div><div class="ssub">Cuatro situaciones que ocurren todos los días</div></div>
<div class="cc cg"><h3>📍 La ducha tibia</h3><p>Mezclas agua caliente del calentador (60°C) con agua fría de la llave (18°C). El calor del agua caliente pasa a la fría hasta que toda queda a la misma temperatura.</p>
<div class="ex">🚿 Si pones más agua caliente que fría, el equilibrio estará más cerca de 60°C. Si son cantidades iguales, será el promedio de las dos. Así controlas la temperatura de la ducha mezclando las dos llaves.</div></div>
<div class="cc cf"><h3>📍 La fiebre y el paño frío</h3><p>Alguien tiene fiebre de 39°C. El paño húmedo frío en la frente extrae calor del cuerpo por dos mecanismos simultáneos.</p>
<div class="ex">🤒 El paño frío absorbe calor del cuerpo por equilibrio térmico (conducción). Además, el agua del paño al evaporarse absorbe calor latente adicional de la piel. Los dos efectos juntos bajan la temperatura mejor que un paño seco.</div></div>
<div class="cc ci"><h3>📍 La taza de café fría</h3><p>Si echas café caliente en una taza fría, el café cede calor a la taza y se enfría más rápido que si la echaras en una taza ya caliente.</p>
<div class="ex">☕ Los buenos cafeteros calientan la taza antes de servir el espresso: así la taza no "roba" calor al café por equilibrio térmico, y llega más caliente al cliente.</div></div>
<div class="cc cy"><h3>📍 La nevera abierta</h3><p>Cuando dejas la nevera abierta, el aire caliente de la cocina y el aire frío del interior intercambian calor — el interior se calienta.</p>
<div class="ex">🏠 Cada segundo que la nevera está abierta entra calor del ambiente. El compresor tiene que trabajar mucho más para recuperar la temperatura baja. Por eso nunca debes dejar la nevera abierta mientras decides qué comer.</div></div>`);

// ══ PANTALLAS 19-24: TRANSMISIÓN ══
addS('s19','Conducción del calor','↔️','Tema 1 · Calor y Temperatura',`
<div class="sh"><div class="stit">Conducción del calor</div><div class="ssub">El calor viaja de molécula en molécula — sin que la materia se desplace</div></div>
<div class="cc cf"><h3>🔗 ¿Cómo funciona?</h3><p>En sólidos, las moléculas están fijas pero vibran. Cuando una zona se calienta, vibra con más fuerza y "contagia" esa vibración a las vecinas. El calor viaja de molécula en molécula hacia zonas más frías, <strong>sin que ninguna molécula se desplace de su lugar</strong>.</p>
<div class="wn">⚠️ <strong>Conductores vs aislantes:</strong> Metales = buenos conductores (calor viaja rápido). Madera, plástico, corcho, aire = aislantes (calor viaja muy lento). Los aislantes no bloquean el calor — lo retrasan.</div></div>
<div class="cc cy"><h3>📍 Cuatro ejemplos en tu hogar</h3>
<div class="ex">1️⃣ <strong>El mango de la olla:</strong> La olla hierve pero el mango de madera no quema. La madera conduce el calor lentísimamente. Por eso los mangos son de madera o plástico, nunca de metal.</div>
<div class="ex">2️⃣ <strong>La cuchara en la sopa:</strong> Dejas una cuchara de metal en la sopa caliente 2 minutos. El mango se calienta aunque no esté sumergido — el calor viajó por todo el metal desde la punta hasta el mango.</div>
<div class="ex">3️⃣ <strong>El piso de cerámica en la mañana:</strong> La cerámica está a la misma temperatura que la alfombra del cuarto, pero se siente mucho más fría. La cerámica conduce el calor de tus pies hacia el suelo muy rápido — esa pérdida veloz se siente como frío intenso.</div>
<div class="ex">4️⃣ <strong>El termo con periódico:</strong> Envolver el termo con papel periódico lo mantiene caliente más tiempo. El papel es mal conductor — crea una barrera que retarda la conducción del calor hacia el aire frío exterior.</div></div>`);

addS('s20','Convección del calor','↔️','Tema 1 · Calor y Temperatura',`
<div class="sh"><div class="stit">Convección del calor</div><div class="ssub">El calor viaja junto con el movimiento del fluido — aquí la materia sí se desplaza</div></div>
<div class="cc ci"><h3>🌊 ¿Cómo funciona?</h3><p>En líquidos y gases, cuando una parte se calienta, se vuelve <strong>menos densa</strong> (más liviana) y sube. La parte más fría, más densa, baja a reemplazarla. Se forman corrientes circulares que distribuyen el calor. A diferencia de la conducción, aquí <strong>la materia misma se desplaza</strong>.</p></div>
<div class="cc cg"><h3>📍 Cuatro ejemplos</h3>
<div class="ex">1️⃣ <strong>El agua hirviendo en la olla:</strong> El agua del fondo se calienta, sube. El agua fría de arriba baja. Corrientes circulares distribuyen el calor uniformemente — por eso el agua hierve en toda la olla, no solo en el fondo.</div>
<div class="ex">2️⃣ <strong>Las brisas de Cúcuta:</strong> En tardes calurosas, el aire sobre el asfalto y los techos se calienta, se vuelve liviano y sube. El aire más fresco de parques y zonas verdes baja a reemplazarlo. Así se generan las brisas locales.</div>
<div class="ex">3️⃣ <strong>El globo aerostático:</strong> El quemador calienta el aire dentro del globo. Ese aire caliente es menos denso que el exterior — el globo flota. Si se apaga el quemador, el aire se enfría, se vuelve más denso y el globo desciende.</div>
<div class="ex">4️⃣ <strong>La nevera abierta:</strong> Al abrir la nevera, el aire frío del interior cae al suelo (más denso) y el aire caliente de la cocina entra por arriba. Corrientes de convección que calientan el interior y hacen trabajar más al compresor.</div></div>`);

addS('s21','Radiación del calor','↔️','Tema 1 · Calor y Temperatura',`
<div class="sh"><div class="stit">Radiación del calor</div><div class="ssub">El calor viaja en forma de ondas — sin necesitar ningún material entre los dos cuerpos</div></div>
<div class="cc cy"><h3>☀️ ¿Cómo funciona?</h3><p>Cualquier cuerpo con temperatura emite ondas electromagnéticas (principalmente infrarrojas) en todas las direcciones. Estas ondas pueden atravesar el vacío total. <strong>No necesitan ningún material</strong> para propagarse.</p>
<div class="ex">🌌 El Sol está a 150 millones de km. Entre él y la Tierra hay vacío absoluto. Sin embargo su calor llega. Eso solo es posible por radiación. La conducción y la convección son imposibles en el vacío.</div></div>
<div class="cc cf"><h3>📍 Cuatro ejemplos</h3>
<div class="ex">1️⃣ <strong>La fogata en el patio:</strong> A 2 metros sientes calor intenso en la cara aunque no haya viento. Las ondas infrarrojas viajan en línea recta hasta tu piel sin necesitar el aire. Si pones un cartón entre tú y la fogata, el calor disminuye porque bloquea esas ondas.</div>
<div class="ex">2️⃣ <strong>El asfalto caliente sin tocarlo:</strong> Caminando cerca del asfalto en un día soleado, sientes calor en las piernas aunque no lo estés pisando. El asfalto re-emite la radiación solar hacia todo lo que está alrededor.</div>
<div class="ex">3️⃣ <strong>La plancha de ropa:</strong> Acercas la mano sin tocarla y ya sientes el calor intenso. Las ondas infrarrojas llegan a tu piel antes de que la toques. Por eso es peligroso acercar la mano para "verificar" si está caliente.</div>
<div class="ex">4️⃣ <strong>El microondas:</strong> Calienta los alimentos con ondas electromagnéticas que penetran directamente el alimento. Por eso el interior del microondas no se calienta pero el alimento sí — las ondas calientan el agua dentro del alimento directamente.</div></div>`);

addS('s25','Dilatación lineal y superficial','📏','Tema 1 · Calor y Temperatura',`
<div class="sh"><div class="stit">La dilatación lineal y superficial</div><div class="ssub">Al calentarse, todos los materiales necesitan más espacio. Al enfriarse, se contraen.</div></div>
<div class="cc cg"><h3>📏 ¿Qué es la dilatación?</h3><p>Cuando un material se calienta, sus moléculas vibran con más fuerza y se separan un poco más — el material se expande. Al enfriarse, las moléculas se acercan y el material se contrae. Ocurre en <strong>todos los materiales</strong>: sólidos, líquidos y gases.</p></div>
<div class="two">
<div class="cc cf"><h3>📐 Dilatación lineal</h3><p style="font-size:11.5px;">Un objeto se dilata principalmente en su <strong>longitud</strong>. Aplica a varillas, rieles, cables.</p>
<div class="ex">🌉 Los rieles de tren tienen espacios entre segmentos. En verano el metal se calienta y se dilata varios mm. Sin esos espacios (juntas de dilatación), los rieles se doblarían o romperían.</div>
<div class="ex">⚡ Los cables eléctricos se instalan deliberadamente flojos. En invierno el metal se contrae y el cable se acorta. Si estuviera tenso, la contracción lo rompería o derribaría el poste.</div>
<div class="ex">🌡️ El mercurio en el termómetro se dilata en la columna del tubo. Como el tubo es muy delgado, una pequeña dilatación produce un gran cambio visible en la altura.</div></div>
<div class="cc ci"><h3>🔲 Dilatación superficial</h3><p style="font-size:11.5px;">Una lámina crece en <strong>largo y ancho</strong> al calentarse.</p>
<div class="ex">🚪 Las puertas de madera quedan apretadas en épocas de lluvia. La madera absorbe humedad y se dilata en todas sus dimensiones — incluyendo el ancho del marco. Por eso queda atascada.</div>
<div class="ex">🏗️ Los techos de lámina metálica no se sueldan entre sí — se solapan. Eso permite que cada lámina se dilate libremente con el calor del mediodía sin deformar a las vecinas.</div>
<div class="ex">🔧 La tapa metálica del frasco de mermelada muy apretada: 10 segundos bajo agua caliente. El metal se dilata más rápido que el vidrio — el diámetro interior aumenta y la rosca se afloja.</div></div>
</div>`);

addS('s26','Dilatación volumétrica y anomalía del agua','📏','Tema 1 · Calor y Temperatura',`
<div class="sh"><div class="stit">Dilatación volumétrica y anomalía del agua</div><div class="ssub">Los gases se dilatan mucho más. Y el agua tiene un comportamiento único que hace posible la vida.</div></div>
<div class="cc cp"><h3>📦 Dilatación volumétrica</h3><p>Un cuerpo crece en sus <strong>tres dimensiones</strong> a la vez. Los gases se dilatan muchísimo más que los líquidos, y los líquidos más que los sólidos con el mismo cambio de temperatura.</p>
<div class="ex">🚗 Las llantas del carro: las verificas en la madrugada y están al nivel correcto. A las 2 pm bajo el sol de Cúcuta, el manómetro muestra presión más alta sin que nadie las inflara. El aire dentro se dilató con el calor y empuja más fuerte las paredes. Siempre verifica la presión en frío.</div>
<div class="ex">🏗️ El pavimento sin juntas de dilatación en un día muy caluroso se "abomba". El asfalto se calentó, se dilató, y sin espacio para expandirse horizontalmente, se deformó hacia arriba.</div>
<div class="ex">🍶 Nunca llenes completamente una botella de vidrio con agua y la congeles. El agua al congelarse se expande y esa fuerza puede romper el vidrio. Siempre deja espacio.</div></div>
<div class="cc cf"><h3>❄️ La anomalía del agua</h3><p>Entre 0°C y 4°C el agua hace algo único: en lugar de dilatarse al calentarse, <strong>se contrae</strong>. A 4°C tiene su mayor densidad. Por eso el hielo es menos denso que el agua líquida y <strong>flota</strong>.</p>
<div class="hl">Si el hielo se hundiera (como casi todo lo demás al solidificarse), los lagos se congelarían completamente de fondo a superficie en invierno. Sin agua líquida, los peces y organismos acuáticos morirían. El hielo que flota crea una capa aislante que protege el agua de abajo — donde la vida continúa.</div>
<div class="ex">🌊 En los páramos y humedales colombianos, los pequeños lagos pueden tener hielo en la superficie en noches muy frías, mientras debajo el agua permanece líquida. Los anfibios y microorganismos que viven allí sobreviven gracias a esta propiedad única del agua.</div></div>`);

// ══ TEMA 2 ══
addS('s31','Las fases de la materia','⚗️','Tema 2 · Fases de la Materia',`
<div class="sh"><div class="stit">Las fases de la materia</div><div class="ssub">Presaberes — el agua que bebes, el hielo del jugo y el vapor de la olla son la misma sustancia</div></div>
<div class="ib">🤔 <strong>Reflexiona:</strong> El agua del grifo, el hielo del congelador y el vapor de la olla son exactamente H₂O. ¿Qué los hace tan diferentes? La organización de sus moléculas.</div>
<div class="three">
<div class="cc ci" style="padding:10px;"><h3 style="font-size:12px;">🧊 Sólido</h3><p style="font-size:11px;">Moléculas muy juntas y ordenadas. Solo vibran en su lugar. Forma y volumen propios.</p><div class="ex" style="font-size:10.5px;">Hielo · acero · madera · sal · vidrio · naftalina</div></div>
<div class="cc cf" style="padding:10px;"><h3 style="font-size:12px;">💧 Líquido</h3><p style="font-size:11px;">Moléculas cercanas pero móviles. Volumen propio, toma la forma del recipiente.</p><div class="ex" style="font-size:10.5px;">Agua · aceite · mercurio · jugo · sangre</div></div>
<div class="cc cy" style="padding:10px;"><h3 style="font-size:12px;">💨 Gas</h3><p style="font-size:11px;">Moléculas muy separadas en movimiento libre. Sin forma ni volumen propios.</p><div class="ex" style="font-size:10.5px;">Vapor · aire · oxígeno · humo · gas del fogón</div></div>
</div>
<div class="cc cg"><h3>🔑 ¿Qué determina el estado?</h3><p>Principalmente la <strong>temperatura</strong> y la <strong>presión</strong>. Al subir la temperatura, las moléculas tienen más energía, se separan más — la sustancia puede cambiar de sólido a líquido, o de líquido a gas.</p>
<div class="ex">🌊 El mismo H₂O existe como hielo (−18°C congelador), como agua líquida (18°C grifo) y como vapor (100°C olla). La única diferencia es la energía de sus moléculas.</div></div>`);

addS('s32','Punto de fusión y ebullición','⚗️','Tema 2 · Fases de la Materia',`
<div class="sh"><div class="stit">Punto de fusión y punto de ebullición</div><div class="ssub">Las temperaturas exactas donde una sustancia cambia de estado — y por qué la temperatura no varía durante el cambio</div></div>
<div class="two">
<div class="cc ci"><h3>🧊 Punto de fusión</h3><p>Temperatura exacta donde una sustancia <strong>pasa de sólido a líquido</strong>. Durante la fusión, aunque se siga calentando, la temperatura <em>no sube</em>.</p>
<div class="ex">🧊 El agua funde a 0°C. Mientras quede hielo en tu vaso, el agua está a 0°C. No subirá hasta que el último cristal de hielo se haya derretido completamente.</div>
<div class="ex">🍫 El chocolate funde entre 34°C y 38°C — muy cerca de la temperatura del cuerpo humano (37°C). Por eso "se derrite en la boca" y también en la mano en días calurosos.</div></div>
<div class="cc cf"><h3>💧 Punto de ebullición</h3><p>Temperatura exacta donde una sustancia <strong>pasa de líquido a gas</strong>. Tampoco sube la temperatura mientras dura el proceso.</p>
<div class="ex">🏠 El agua hierve a 100°C al nivel del mar. Aunque subas el fogón al máximo, el termómetro sigue en 100°C mientras quede agua líquida. La energía extra no sube la temperatura — convierte más agua en vapor.</div>
<div class="ex">🌄 En Bogotá (2600 m) el agua hierve a ~92°C porque hay menos presión atmosférica. Las moléculas necesitan menos energía para escapar. Por eso la comida tarda más en cocinarse allá.</div></div>
</div>
<div class="wb">⚠️ <strong>Principio clave para el ICFES:</strong> Durante cualquier cambio de fase la temperatura permanece <strong>constante</strong> aunque se siga suministrando calor. Toda esa energía va al cambio de estado — no al cambio de temperatura. Esa energía se llama calor latente.</div>`);

addS('s33','La presión cambia el punto de ebullición','⚗️','Tema 2 · Fases de la Materia',`
<div class="sh"><div class="stit">La presión cambia el punto de ebullición</div><div class="ssub">Por qué la altitud importa al cocinar, y cómo la olla a presión aprovecha esto</div></div>
<div class="two">
<div class="cc cp"><h3>🏔️ Mayor altitud → hierve antes</h3><p>A mayor altitud hay menos presión atmosférica. Con menos presión, las moléculas de agua necesitan menos energía para escapar al estado gaseoso — hierven a menor temperatura.</p>
<div class="ex">🍲 En Barranquilla (nivel del mar): el agua hierve a 100°C. En Bogotá (2600 m): hierve a ~92°C. En ambas ciudades el agua hierve, pero la temperatura de cocción es diferente. En Bogotá, un huevo tarda más en cocinarse porque el agua nunca supera 92°C.</div></div>
<div class="cc cg"><h3>🫕 La olla a presión — al revés</h3><p>La olla a presión eleva la presión dentro de ella. Con más presión, el agua necesita más energía para hervir — el punto de ebullición sube a ~120°C. A mayor temperatura, la comida se cocina mucho más rápido.</p>
<div class="ex">⏱️ Un fríjol en olla normal puede tardar 2 horas. En olla a presión: 30 minutos. La física al servicio de la cocina tradicional colombiana.</div></div>
</div>

</table>`);

// ══ CAMBIOS DE FASE ══
addS('s37','Los cambios de fase — nombres','⚗️','Tema 2 · Fases de la Materia',`
<div class="sh"><div class="stit">Los cambios de fase</div><div class="ssub">Cada cambio entre estados tiene un nombre específico según la dirección</div></div>
<div class="cc cp"><h3>🔄 Los seis cambios posibles</h3>
<div class="hl">🧊→💧 <strong>Fusión</strong> — sólido a líquido<br>💧→🧊 <strong>Solidificación</strong> — líquido a sólido<br>💧→💨 <strong>Vaporización</strong> — líquido a gas (hierve o se evapora)<br>💨→💧 <strong>Condensación</strong> — gas a líquido<br>🧊→💨 <strong>Sublimación</strong> — sólido a gas directamente<br>💨→🧊 <strong>Sublimación inversa</strong> — gas a sólido directamente</div></div>
<div class="two">
<div class="cc cf"><h3>📍 Fusión y solidificación</h3>
<div class="ex" style="font-size:11px;">🧊 <strong>Fusión:</strong> hielo del vaso se derrite · mantequilla en la sartén · chocolate al baño María · cera de la vela.</div>
<div class="ex" style="font-size:11px;">❄️ <strong>Solidificación:</strong> agua formando cubitos en el congelador · gelatina enfriándose · agua del río en invierno en la cordillera.</div></div>
<div class="cc ci"><h3>📍 Condensación y sublimación</h3>
<div class="ex" style="font-size:11px;">💧 <strong>Condensación:</strong> vidrio del carro empañado · gotitas de rocío en plantas · espejo del baño tras la ducha · las nubes.</div>
<div class="ex" style="font-size:11px;">✨ <strong>Sublimación:</strong> bolas de naftalina del ropero encogen sin dejar charco · hielo seco que "desaparece" · escarcha en páramos que sublima directamente.</div></div>
</div>
<div class="cc cg"><h3>📍 Vaporización</h3>
<div class="ex">💨 <strong>Vaporización:</strong> ropa mojada secándose al sol · charco de agua que desaparece durante el día · olla de agua que hierve y se convierte en vapor · el sudor que se evapora de tu cuerpo tras el ejercicio.</div></div>`);

addS('s38','La temperatura no cambia — calor latente','⚗️','Tema 2 · Fases de la Materia',`
<div class="sh"><div class="stit">La temperatura no cambia durante el cambio de fase</div><div class="ssub">¿Por qué el agua hierve a 100°C aunque el fogón esté al máximo? La respuesta está en el calor latente.</div></div>
<div class="cc cf"><h3>🔬 El calor latente — la energía oculta</h3><p>Durante un cambio de fase, toda la energía recibida se usa en <strong>romper o formar los enlaces entre moléculas</strong> para cambiar de estado — no en aumentar la velocidad de agitación de las moléculas (que es lo que sube la temperatura). Por eso el termómetro no sube durante el cambio.</p>
<div class="hl">La energía necesaria para que una sustancia cambie de estado sin cambiar de temperatura se llama <strong>calor latente</strong>. "Latente" significa oculto — porque esa energía no se manifiesta como cambio de temperatura.</div></div>
<div class="cc cy"><h3>📍 Cuatro ejemplos clave</h3>
<div class="ex">1️⃣ <strong>El helado que se derrite:</strong> Mientras el helado se derrite, el termómetro al lado marca 0°C todo el tiempo aunque esté absorbiendo calor del ambiente. Solo cuando el último cristal de hielo se derrita, la temperatura del agua empezará a subir.</div>
<div class="ex">2️⃣ <strong>El agua que hierve:</strong> Subes el fogón al máximo esperando que hierva más rápido. El agua hierve más fuerte (produce más vapor) pero el termómetro sigue en 100°C. La energía extra convierte más agua en vapor — no sube la temperatura.</div>
<div class="ex">3️⃣ <strong>¿Por qué el vapor quema más?</strong> El vapor de la olla a presión y el agua hirviendo están ambos a 100°C. Pero el vapor quema mucho más. Al condensarse en tu piel, el vapor libera el calor latente acumulado durante la vaporización — una cantidad enorme de energía extra que el agua líquida no tiene.</div>
<div class="ex">4️⃣ <strong>El sudor refresca:</strong> Tu cuerpo suda para enfriarse. Al evaporarse, el sudor necesita energía para cambiar de estado — esa energía la "roba" de tu piel. Por eso el sudor refresca aunque el ambiente esté caliente: la evaporación extrae calor latente directamente de tu cuerpo.</div></div>`);

addS('s39','Evaporación frente a ebullición','⚗️','Tema 2 · Fases de la Materia',`
<div class="sh"><div class="stit">Evaporación frente a ebullición</div><div class="ssub">Las dos son vaporización (líquido a gas), pero ocurren en condiciones completamente diferentes</div></div>
<div class="two">
<div class="cc ci"><h3>🌫️ Evaporación</h3><p>Ocurre <strong>solo en la superficie</strong> del líquido, a <strong>cualquier temperatura</strong>, de forma lenta y silenciosa, sin burbujas.</p>
<div class="ex">🌤️ La ropa mojada se seca en el patio a 25°C sin hervir. Las moléculas de agua en la superficie del tejido con más energía se escapan al aire.</div>
<div class="ex">💧 Un charco después de la lluvia desaparece lentamente durante el día — evaporación continua en la superficie a temperatura ambiente.</div>
<div class="ex">🏃 El sudor se evapora de tu piel. Al hacerlo absorbe calor latente de tu cuerpo — por eso refresca.</div>
<div class="ex">🌊 Los ríos y mares evaporan agua constantemente hacia la atmósfera — ese es el origen de la humedad del aire y de las lluvias.</div></div>
<div class="cc cf"><h3>🔥 Ebullición</h3><p>Ocurre en <strong>toda la masa</strong> del líquido, solo a la <strong>temperatura de ebullición exacta</strong>, con burbujas visibles.</p>
<div class="ex">🏠 El agua hierve en la olla a 100°C con burbujas que se forman en toda la masa del agua — no solo en la superficie. Las burbujas son vapor que se forma dentro del líquido y sube.</div>
<div class="ex">☕ El agua para el tinto debe hervir (ebullición a 100°C). La ropa se seca sola al sol (evaporación a 25°C). Son procesos distintos aunque los dos conviertan agua en vapor.</div>
<div class="ex">🔬 Si calientas alcohol en un beaker abierto a 50°C, el alcohol se evapora de la superficie (evaporación). Si lo calientas hasta 78.5°C, hace burbujas en toda la masa (ebullición).</div></div>
</div>
<div class="cc cg" style="margin-top:8px;"><h3>🌿 El rocío — condensación</h3>
<div class="ex">En madrugadas frías del norte de Santander, el vapor del aire toca las plantas frías y pasa de gas a líquido formando el rocío. El mismo proceso empaña los vidrios del carro y forma las nubes.</div></div>`);

{c:'Al salir de la ducha mojado sientes frío aunque la habitación esté a 22°C.',q:'¿Qué proceso físico explica esa sensación de frío?',o:['El agua fría de la ducha baja permanentemente la temperatura corporal','El vapor de agua al evaporarse absorbe calor latente directamente de la piel, enfriándola','El cuerpo produce menos calor cuando está mojado','El frío del ambiente penetra más fácil la piel húmeda'],a:1,f:'Al evaporarse, el agua necesita energía (calor latente) que toma de tu piel. Esa extracción de energía enfría la piel. El frío que sientes es tu cuerpo perdiendo calor.'},
{c:'Un vaso con refresco frío se deja sobre la mesa. Al rato ya no está frío.',q:'¿Cuál afirmación describe correctamente lo ocurrido?',o:['El frío del refresco se evaporó hacia el ambiente','El calor del ambiente viajó hacia el refresco hasta que ambos alcanzaron la misma temperatura','El refresco generó calor al estar en contacto con la mesa','El ambiente absorbió el frío del refresco'],a:1,f:'El calor siempre viaja del más caliente (ambiente 26°C) al más frío (refresco 4°C). El proceso se detuvo cuando ambos alcanzaron la misma temperatura — equilibrio térmico.'},
{c:'Un estudiante dice: "el hielo enfría el agua porque el frío del hielo pasa al agua".',q:'¿Es correcta esa afirmación?',o:['Sí — el frío es energía que puede transferirse','No — el frío no fluye. El calor del agua viaja hacia el hielo, no al revés','Sí — pero solo cuando el hielo está sumergido directamente','No — el agua no se enfría con el hielo, solo mezclan temperaturas'],a:1,f:'El frío no existe como flujo de energía. SIEMPRE es el calor el que se mueve, del más caliente (agua) al más frío (hielo).'},
{c:'Una cuchara de metal y un mango de madera llevan horas en el mismo cajón a temperatura ambiente.',q:'¿Por qué el metal se siente más frío si ambos están a la misma temperatura?',o:['Porque el metal está realmente a menor temperatura','Porque el metal extrae calor de la mano mucho más rápido — esa pérdida rápida se siente como frío intenso','Porque la madera genera calor propio que la mantiene cálida','Porque el metal tiene más masa y absorbe más temperatura del ambiente'],a:1,f:'Misma temperatura, diferente conductividad. El metal conduce bien = extrae calor de tu mano rápido = parece muy frío. La madera conduce mal = extrae calor lento = parece tibio.'},
{c:'El termómetro clínico se deja bajo el brazo 3 minutos para medir la temperatura.',q:'¿Qué principio explica por qué marca la temperatura exacta del cuerpo?',o:['La presión del brazo comprime el mercurio al nivel correcto','El termómetro alcanza el equilibrio térmico con el cuerpo — intercambian calor hasta que ambos están a la misma temperatura','El cuerpo emite radiación que el mercurio absorbe directamente','El termómetro tiene un mecanismo interno que detecta la temperatura'],a:1,f:'Equilibrio térmico: el termómetro y el cuerpo intercambian calor hasta que están a la misma temperatura. Cuando el mercurio deja de subir, el termómetro marca la temperatura exacta del cuerpo.'},
],
qt2:[
{c:'Se calienta 1 kg de agua y 1 kg de hierro con el mismo fogón el mismo tiempo.',q:'¿Cuál llegará a mayor temperatura?',o:['El agua — tiene mayor calor específico y absorbe más calor','El hierro — tiene menor calor específico, sube más de temperatura con el mismo calor','Los dos a la misma temperatura','El hierro solo si es más pequeño en volumen'],a:1,f:'El hierro tiene calor específico mucho menor que el agua. Con el mismo calor suministrado, el hierro sube mucho más de temperatura.'},
{c:'En la costa, la arena quema los pies al mediodía pero el mar está fresco, aunque ambos recibieron el mismo sol toda la mañana.',q:'¿Qué explica esta diferencia?',o:['El mar está más profundo y la brisa lo refresca','La arena es más oscura y absorbe más calor solar','El agua tiene calor específico mucho más alto — necesita mucho más calor para subir la misma temperatura','La arena tiene contacto con el suelo caliente'],a:2,f:'El calor específico del agua es mucho mayor que el de la arena. Con el mismo calor solar, la arena sube mucho más de temperatura que el agua. Por eso la arena quema y el mar está fresco.'},
{c:'Un pocillo de tinto de metal y uno de cerámica tienen el mismo café a 88°C. Se dejan en la mesa.',q:'¿Cuál café se enfriará más rápido?',o:['El de cerámica — conduce el calor mejor','El de metal — conduce el calor al ambiente más rápidamente','Los dos a la misma velocidad','El de metal solo si está sobre superficie fría'],a:1,f:'El metal tiene mayor conductividad térmica que la cerámica. El café en pocillo de metal transfiere su calor al ambiente más rápido. Por eso los buenos pocillos son de cerámica gruesa.'},
{c:'Las ciudades costeras del Caribe colombiano tienen climas más estables que ciudades del interior a igual latitud.',q:'¿Qué propiedad del agua del mar lo explica?',o:['La transparencia del agua que refleja la luz solar','El alto calor específico del agua — absorbe calor en verano y lo libera lentamente en invierno, estabilizando el clima','La convección constante del agua','La reflexión de la radiación solar en la superficie'],a:1,f:'El alto calor específico del agua hace que los océanos actúen como reguladores climáticos: absorben enormes cantidades de calor sin calentarse mucho, y lo liberan gradualmente.'},
{c:'Se tienen 2 litros de agua caliente y se mezclan con 1 litro de agua fría de la misma temperatura inicial.',q:'¿Cómo cambia la temperatura de equilibrio si se usa más agua caliente?',o:['La temperatura de equilibrio siempre es el promedio independiente de las masas','La temperatura de equilibrio se acerca más a la del agua caliente cuando hay más de ella','La temperatura de equilibrio siempre es la del agua fría','La temperatura no cambia si se mezclan cantidades diferentes'],a:1,f:'La temperatura de equilibrio depende de las masas. Con más agua caliente, la temperatura de equilibrio final estará más cerca de la temperatura del agua caliente.'},
],
qt3:[
{c:'Se mezclan 500 ml de agua a 80°C con 500 ml de agua a 20°C en recipiente aislado.',q:'¿Cuál será la temperatura de equilibrio?',o:['80°C — el agua caliente domina','20°C — el agua fría domina','50°C — con masas y material iguales la temperatura de equilibrio es el promedio','60°C — el agua caliente aporta más'],a:2,f:'Con masas iguales del mismo material: T_eq = (80+20)/2 = 50°C. El calor cedido por el agua caliente = el absorbido por el agua fría.'},
{c:'La abuela tiene fiebre de 38.5°C. Se pone un paño húmedo frío en la frente.',q:'¿Por qué el paño húmedo es más efectivo que un paño seco a igual temperatura?',o:['El paño húmedo pesa más y presiona mejor','El paño húmedo extrae calor por equilibrio térmico Y por calor latente al evaporarse — doble mecanismo','El paño húmedo bloquea la radiación del cuerpo','El agua del paño contiene sales que absorben la fiebre'],a:1,f:'Doble mecanismo: el paño más frío absorbe calor del cuerpo por equilibrio térmico (conducción), y el agua al evaporarse absorbe calor latente adicional de la piel. Los dos efectos juntos son más potentes.'},
{c:'Al entrar a un cuarto con aire acondicionado fuerte, una persona siente que "el frío le atacó".',q:'¿Cuál es la descripción física correcta?',o:['El frío del cuarto salió a tocar el cuerpo','El cuerpo cede calor rápidamente al aire frío del cuarto — esa pérdida acelerada se percibe como frío intenso','El aire frío y el cuerpo intercambian frío en partes iguales','La presión del aire frío ejerce fuerza sobre la persona'],a:1,f:'El cuerpo (37°C) está en un ambiente frío (18°C). El calor fluye del cuerpo al aire frío rápidamente. Esa pérdida acelerada de calor del cuerpo es lo que se siente como "frío intenso".'},
{c:'Un termómetro marca 0°C dentro de un vaso con hielo y agua mezclados.',q:'¿Cuándo subirá la temperatura del termómetro?',o:['Nunca — el hielo mantiene siempre 0°C','Cuando todo el hielo se haya derretido completamente','Cuando el agua haya cedido todo su calor al hielo','Cuando el termómetro alcance el equilibrio con el hielo'],a:1,f:'Mientras quede hielo presente, la temperatura permanece en 0°C (punto de fusión del agua). Solo cuando el último cristal de hielo sea agua líquida, la temperatura puede subir.'},
{c:'¿Por qué se recomienda calentar la taza antes de servir el espresso?',o:['Para esterilizarla antes de usarla','Para evitar que la taza fría absorba calor del café por equilibrio térmico, manteniendo la bebida más caliente','Por tradición sin base física','Para que la cerámica se expanda y quepa más café'],a:1,f:'Equilibrio térmico: si la taza está fría, absorbe calor del café caliente hasta alcanzar la misma temperatura. Eso enfría el café. Una taza caliente no "roba" calor al café.'},
],
qt4:[
{c:'A 2 metros de una fogata sientes calor intenso en la cara aunque no haya viento.',q:'¿Qué mecanismo transmite ese calor?',o:['Conducción — el calor viaja por el suelo hasta tus pies','Convección — el aire caliente de la fogata sube y llega a tu cara','Radiación — la fogata emite ondas que viajan directamente a tu piel sin necesitar el aire','Equilibrio térmico directo entre tú y la fogata'],a:2,f:'Radiación: la fogata emite ondas infrarrojas en todas las direcciones sin necesitar el aire. Por eso sientes calor aunque el aire esté completamente quieto.'},
{c:'El agua de una olla se calienta uniformemente aunque solo el fondo toque el fogón.',q:'¿Qué mecanismo distribuye el calor en toda el agua?',o:['Conducción — el calor pasa de molécula en molécula desde el fondo','Convección — el agua caliente del fondo sube (menos densa) y la fría baja, creando corrientes','Radiación — el fondo caliente emite ondas que calientan el agua superior','Los tres mecanismos en igual proporción'],a:1,f:'Convección en líquidos: el agua del fondo se calienta, se vuelve menos densa y sube. El agua fría baja a reemplazarla. Corrientes circulares distribuyen el calor uniformemente.'},
{c:'Un termo de doble pared con vacío entre las paredes mantiene el café caliente durante horas.',q:'¿Por qué el vacío es tan efectivo?',o:['El vacío está a 0°C y equilibra los extremos','Sin materia no puede haber ni conducción ni convección — solo queda la mínima radiación que las paredes pulidas reflejan','El vacío genera presión negativa que retiene el calor','Las paredes metálicas generan un campo que retiene el calor'],a:1,f:'Conducción necesita materia. Convección necesita fluido. El vacío no tiene ninguno de los dos. Solo queda la radiación, que las paredes internas pulidas del termo minimizan al reflejarla.'},
{c:'El Sol calienta la Tierra a través de 150 millones de km de vacío total.',q:'¿Qué mecanismo lo hace posible?',o:['Conducción a través de partículas muy finas del espacio','Convección del viento solar extendido','Radiación — el Sol emite ondas electromagnéticas que viajan por el vacío sin necesitar ningún material','Equilibrio térmico a distancia por efecto gravitacional'],a:2,f:'Solo la radiación puede viajar por el vacío absoluto. El Sol emite ondas electromagnéticas (luz, infrarrojos) que atraviesan el espacio y calientan la Tierra.'},
{c:'¿Por qué los mangos de las ollas son de madera o plástico y no de metal?',o:['Son más baratos de fabricar','Son malos conductores del calor — transmiten el calor de la olla a la mano muy lentamente','El metal es muy pesado para el mango','El plástico resiste mejor las altas temperaturas que el metal'],a:1,f:'La madera y el plástico tienen muy baja conductividad térmica. El calor de la olla tarda mucho en llegar al mango. Un mango de metal conduciría el calor rápidamente y quemaría la mano.'},
],
qt5:[
{c:'Los rieles de tren tienen pequeños espacios entre segmentos.',q:'¿Cuál es la razón física de esos espacios?',o:['Para reducir el ruido y vibración','Para que el metal pueda dilatarse en verano sin que los tramos choquen, se doblen o rompan','Para facilitar el mantenimiento individual de cada segmento','Para que el agua lluvia drene entre los segmentos'],a:1,f:'Dilatación lineal: el metal se expande con el calor. En un día caluroso, cada riel puede crecer varios milímetros. Las juntas de dilatación absorben esa expansión sin que los rieles se doblen.'},
{c:'Una botella de vidrio completamente llena de agua se pone en el congelador y al día siguiente está rota.',q:'¿Qué explica la ruptura?',o:['El vidrio se contrae con el frío más rápido que el agua','El agua al congelarse se expande — sin espacio, la presión del hielo rompe el vidrio','El cambio brusco de temperatura fractura el vidrio','El frío hace frágil el vidrio y cualquier vibración lo rompe'],a:1,f:'Anomalía del agua: al congelarse se expande (necesita más volumen). Si la botella está llena, no hay espacio. La fuerza del hielo en expansión rompe el vidrio. Siempre deja espacio al congelar líquidos.'},
{c:'Las llantas del carro marcan presión correcta en la madrugada fría. A las 2 pm muestran presión más alta sin que nadie las inflara.',q:'¿Qué explica el aumento?',o:['El movimiento del carro genera calor que entra a las llantas','El aire dentro se dilata con el calor y empuja más fuerte las paredes — mayor presión','El caucho se ablanda y reduce el espacio interior','El calor del asfalto comprime el aire de las llantas'],a:1,f:'Dilatación volumétrica en gases: el aire calentado ejerce más presión sobre las paredes de la llanta. Por eso siempre se verifica la presión en frío — la lectura en caliente es falsa.'},
{c:'¿Por qué el hielo flota en el agua en lugar de hundirse como hace casi todo lo demás al solidificarse?',o:['El hielo es hueco por dentro y eso lo hace menos denso','Anomalía del agua: al congelarse se expande y el hielo resulta menos denso que el agua líquida — por eso flota','La tensión superficial del agua sostiene el hielo flotando','El hielo flota solo en agua dulce, no en agua salada'],a:1,f:'Anomalía del agua: al congelarse, el agua se expande y el hielo tiene menor densidad que el agua líquida. Menor densidad = flota. Sin esta propiedad, los lagos se congelarían de fondo a superficie y no habría vida acuática.'},
{c:'Al calentar una lámina cuadrada de metal, se observa que crece en largo, ancho y grosor.',q:'¿Cuál tipo de dilatación describe mejor este fenómeno?',o:['Dilatación lineal — el calor actúa en una sola dirección','Dilatación superficial — solo crece en largo y ancho','Dilatación volumétrica — el cuerpo crece en sus tres dimensiones simultáneamente','Anomalía del metal — todos los metales se comportan diferente'],a:2,f:'Dilatación volumétrica: cualquier sólido en realidad se dilata en sus tres dimensiones. Lineal y superficial son simplificaciones para objetos donde una o dos dimensiones dominan.'},
],
qt6:[
{c:'Se pone agua a hervir en Bogotá (2600 m de altitud) y en Barranquilla (nivel del mar).',q:'¿En cuál ciudad hervirá a menor temperatura y por qué?',o:['En Barranquilla — el calor costero es más intenso','En Bogotá — la menor presión atmosférica reduce la energía que las moléculas necesitan para escapar al estado gaseoso','En las dos a la misma temperatura — el punto de ebullición no cambia','En Bogotá — el frío de la ciudad requiere menos energía para hervir'],a:1,f:'El punto de ebullición depende de la presión. A mayor altitud, menor presión atmosférica. Las moléculas de agua necesitan menos energía para escapar al estado gaseoso — hierven a menor temperatura (~92°C en Bogotá).'},
{c:'Un bloque de hielo a 0°C recibe calor constantemente.',q:'¿Qué ocurre con la temperatura mientras el hielo se derrite?',o:['Sube gradualmente de 0°C hasta 100°C','Permanece en 0°C durante toda la fusión — toda la energía va al cambio de estado','Baja porque el derretirse consume temperatura del sistema','Oscila entre −5°C y 5°C hasta que todo se derrite'],a:1,f:'Durante la fusión la temperatura permanece en 0°C. Toda la energía suministrada va al calor latente de fusión (romper los enlaces del hielo). Solo cuando no quede hielo, la temperatura puede subir.'},
{c:'El mercurio se usa en termómetros clásicos. Su punto de fusión es −39°C y su punto de ebullición es 358°C.',q:'¿Por qué estas propiedades lo hacen útil para termómetros?',o:['Porque es el único metal líquido a temperatura ambiente','Permanece líquido en todo el rango de temperaturas de uso cotidiano y se dilata de manera muy constante y predecible','Porque tiene color plateado que facilita la lectura','Porque tiene alto calor específico que lo hace muy sensible'],a:1,f:'El mercurio permanece líquido entre −39°C y 358°C — cubre todo el rango de uso cotidiano. Su coeficiente de dilatación es muy constante: cada grado produce el mismo aumento de volumen, lo que da lecturas precisas.'},
{c:'El alcohol etílico hierve a 78.5°C y el agua a 100°C. Se mezclan y se calientan juntos.',q:'¿Qué ocurrirá primero?',o:['El agua hervirá primero porque tiene mayor punto de ebullición','El alcohol se vaporizará primero — llega antes a su punto de ebullición (78.5°C)','Los dos hervirán exactamente al mismo tiempo','Ninguno hervira — la mezcla tiene un punto de ebullición intermedio invariable'],a:1,f:'El alcohol llega primero a su punto de ebullición (78.5°C). Este principio se usa en la destilación para separar el alcohol del agua en la producción de licores.'},
{c:'¿Qué tienen en común el punto de fusión y el punto de ebullición respecto a la temperatura?',o:['En ambos la temperatura sube rápidamente','En ambos la temperatura permanece constante mientras dura el cambio de estado — toda la energía va al calor latente','En fusión sube y en ebullición baja','Son completamente diferentes — no tienen nada en común'],a:1,f:'En ambos cambios de fase la temperatura es constante. Toda la energía va al calor latente — a cambiar el estado, no la temperatura. Por eso aparecen como tramos horizontales en la gráfica.'},
],
qt7:[
{c:'El vapor de agua a 100°C y el agua líquida a 100°C están a la misma temperatura.',q:'¿Por qué una quemadura con vapor es más severa que con agua líquida a la misma temperatura?',o:['El vapor se mueve más rápido y ejerce más presión sobre la piel','Al condensarse en la piel, el vapor libera el calor latente de vaporización — una gran energía extra que el agua líquida no tiene','El vapor tiene mayor temperatura real aunque el termómetro marque lo mismo','El vapor penetra más profundo en la piel que el agua líquida'],a:1,f:'Calor latente de vaporización: el vapor al condensarse libera toda la energía acumulada durante la vaporización. Esa energía extra es lo que causa la quemadura más severa. El agua líquida a 100°C no tiene esa energía almacenada.'},
{c:'Las bolas de naftalina del ropero se van haciendo más pequeñas sin dejar ningún líquido en el cajón.',q:'¿Qué cambio de fase explica esto?',o:['Evaporación — la naftalina es un líquido transparente que se evapora','Fusión — se derrite pero el líquido es invisible','Sublimación — la naftalina pasa directamente de sólido a gas sin pasar por líquido','Condensación inversa de las moléculas sólidas'],a:2,f:'Sublimación: sólido pasa directamente a gas sin pasar por el estado líquido. Por eso no hay charco. El gas de naftaleno que se libera es el que ahuyenta las polillas.'},
{c:'La ropa mojada se seca en el patio a 25°C sin llegar a 100°C.',q:'¿Cómo se llama este proceso y por qué ocurre a temperatura baja?',o:['Ebullición retardada — el sol calienta el agua hasta 100°C en el tejido','Evaporación — las moléculas de agua en la superficie del tejido con suficiente energía se escapan al aire a cualquier temperatura','Sublimación del agua en la ropa','Vaporización instantánea por la radiación solar'],a:1,f:'Evaporación: proceso de vaporización que ocurre solo en la superficie a cualquier temperatura. Las moléculas con más energía cinética en la superficie se escapan al aire. No necesita llegar a 100°C.'},
{c:'En una mañana fría del norte de Santander, las plantas del jardín amanecen con gotitas de rocío.',q:'¿Qué cambio de fase produjo esas gotitas?',o:['Fusión del hielo de la noche anterior','Condensación — el vapor del aire caliente se convirtió en líquido al tocar las superficies frías de las plantas','Precipitación — microgotas de lluvia muy fina se depositaron en las plantas','Sublimación inversa del hielo de la atmósfera'],a:1,f:'Condensación: durante la noche las plantas se enfriaron. El vapor del aire (más caliente) tocó esas superficies frías y pasó del estado gaseoso al líquido, formando las gotitas de rocío.'},
{c:'El sudor después del ejercicio refresca el cuerpo aunque el ambiente esté caliente.',q:'¿Por qué el sudor refresca si se evapora a temperatura ambiente?',o:['El sudor es un líquido frío producido por las glándulas sudoríparas','Al evaporarse, el sudor absorbe calor latente de vaporización directamente de la piel — extrae energía del cuerpo y lo enfría','El sudor aumenta la conductividad térmica de la piel','El movimiento del sudor al escurrir crea convección que aleja el calor'],a:1,f:'Calor latente de vaporización: para evaporarse, el sudor toma energía directamente de la piel. Esa extracción de energía enfría la superficie corporal. Por eso la brisa ayuda — acelera la evaporación y con ella el enfriamiento.'},
],
qt8:[
{c:'En la gráfica de calentamiento del agua hay una zona horizontal exactamente a 0°C.',q:'¿Qué está ocurriendo durante esa zona?',o:['El calor se acumula para después subir más rápido','El hielo se funde — toda la energía va al calor latente de fusión y la temperatura permanece constante en 0°C','El termómetro tiene error de lectura a 0°C','El agua alcanzó su temperatura mínima posible'],a:1,f:'La zona horizontal a 0°C es la fusión. Toda la energía del fogón va al calor latente — a romper los enlaces del hielo. La temperatura no puede subir hasta que no quede hielo.'},
{c:'El tramo horizontal a 100°C en la gráfica de calentamiento es mucho más largo que el de 0°C.',q:'¿Qué indica esa diferencia?',o:['El fogón pierde potencia a temperaturas altas','El calor latente de vaporización es mucho mayor que el de fusión — se necesita mucha más energía para vaporizar que para derretir','Hay más agua que hielo en el sistema','La temperatura de 100°C es más difícil de mantener estable'],a:1,f:'El calor latente de vaporización es ~7 veces mayor que el de fusión. Se necesita mucha más energía para convertir agua en vapor. Por eso el tramo horizontal a 100°C es mucho más largo en la gráfica.'},
{c:'Un estudiante dice: "cuando el agua hierve, el fogón ya no tiene suficiente potencia para subir la temperatura".',q:'¿Es correcta esa afirmación?',o:['Sí — los fogones pierden eficiencia a temperaturas altas','No — el fogón tiene la misma potencia, pero toda esa energía va al calor latente de vaporización, no a subir la temperatura','Sí — a 100°C el agua ya no puede absorber más calor','No — la temperatura sí sigue subiendo pero el termómetro no lo detecta'],a:1,f:'El fogón mantiene su potencia. Toda la energía va a convertir agua en vapor (calor latente), no a aumentar la agitación molecular (temperatura). Por eso el termómetro permanece en 100°C aunque el fogón esté al máximo.'},
{c:'¿Qué representan los tramos inclinados de la gráfica de calentamiento del agua?',o:['Los momentos en que el fogón se apaga temporalmente','Cambios de temperatura sin cambio de estado — la energía aumenta la agitación molecular (sube la T)','Los momentos en que hay dos estados coexistiendo','Los períodos donde se pierde calor hacia el ambiente'],a:1,f:'Tramos inclinados = cambio de temperatura sin cambio de estado. La energía del fogón va a aumentar la velocidad de agitación de las moléculas — lo que se manifiesta como aumento de temperatura.'},
{c:'Al enfriar vapor de agua desde 120°C hasta hielo a −10°C, ¿cuántas veces permanece constante la temperatura?',o:['Una vez — solo cuando el agua se congela a 0°C','Dos veces — durante la condensación (100°C, gas→líquido) y durante la solidificación (0°C, líquido→sólido)','Tres veces — a 100°C, 50°C y 0°C','La temperatura nunca permanece constante al enfriarse'],a:1,f:'Dos cambios de fase: condensación a 100°C (todo el vapor se convierte en agua antes de que la temperatura baje de 100°C) y solidificación a 0°C (toda el agua se convierte en hielo antes de que la temperatura baje de 0°C).'},
],
};
