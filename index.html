cp1:{sci:'lav',qs:[
{c:'Alguien dice que "el frío del hielo pasa a la bebida caliente para enfriarla".',q:'¿Es correcta esa descripción física?',o:['Sí — el frío es energía que fluye del más frío al más caliente','No — el frío no fluye. El calor de la bebida viaja hacia el hielo','Sí — pero solo con contacto directo','No — el hielo actúa como aislante sin intercambiar energía'],a:1,f:'El frío no existe como flujo de energía. El CALOR siempre fluye del más caliente (bebida) al más frío (hielo).'},
{c:'Dos tazas de café a 90°C: una con tapa, otra sin tapa. Se dejan en la misma habitación.',q:'¿Cuál llegará al equilibrio térmico con el ambiente más rápido?',o:['Las dos igual — mismo café, mismo ambiente','La taza con tapa — la presión acelera el intercambio','La taza sin tapa — pierde calor más rápido por evaporación y convección directa','Ninguna llegará al equilibrio'],a:2,f:'Sin tapa: el café pierde calor por evaporación (calor latente) y por convección directa con el aire. Con tapa estos mecanismos se bloquean.'},
{c:'Al poner la mano sobre una estufa fría no se siente nada. Al encenderla, se siente calor.',q:'¿Qué cambió físicamente?',o:['La estufa creó una nueva sustancia llamada calor','La estufa ya tenía temperatura: la mano generó el calor al tocarla','La diferencia de temperatura entre estufa y mano aumentó — ahora hay flujo de calor de la estufa hacia la mano','La estufa emite electricidad que la mano siente como calor'],a:2,f:'Antes: sin diferencia de temperatura = sin flujo de calor. Después: estufa más caliente que la mano = diferencia = calor fluye de la estufa hacia la mano.'},
{c:'¿Cuál es la diferencia fundamental entre calor y temperatura?',o:['No hay diferencia — son la misma magnitud en distintas unidades','La temperatura mide la agitación molecular de un cuerpo; el calor es energía que fluye entre cuerpos a diferente temperatura','El calor es propiedad del cuerpo; la temperatura es la energía que se transfiere','La temperatura siempre es mayor que el calor en el mismo cuerpo'],a:1,f:'Temperatura = estado térmico del cuerpo (agitación molecular). Calor = energía en movimiento entre cuerpos. Un cuerpo tiene temperatura pero no "tiene" calor — el calor fluye.'},
{c:'Una persona mete la mano en agua a 30°C y dice que "el frío del agua pasó a su mano".',q:'¿Es correcta esa descripción?',o:['Sí — si se siente frío, el frío fluye del agua a la mano','No — el cuerpo (37°C) cede calor al agua (30°C) porque está más caliente. La pérdida de calor se percibe como frío','El calor fluye en ambas direcciones simultáneamente en igual cantidad','Depende de si la persona está sudando o no'],a:1,f:'El cuerpo (37°C) está más caliente que el agua (30°C). El CALOR fluye del cuerpo hacia el agua. Esa pérdida de calor del cuerpo es lo que se interpreta como sensación de frío.'},
]},
cp2:{sci:'tho',qs:[
{c:'Se calientan 1 kg de agua y 1 kg de hierro con el mismo fogón el mismo tiempo.',q:'¿Cuál tendrá mayor temperatura al final?',o:['El agua — más calor específico','El hierro — menor calor específico, sube más con el mismo calor','Los dos igual','El hierro solo si es más pequeño'],a:1,f:'Menor calor específico del hierro = sube más de temperatura con el mismo calor. El agua necesita mucho más calor para la misma subida.'},
{c:'La arena de la playa quema al mediodía pero el mar está fresco, ambos bajo el mismo sol.',q:'¿Qué lo explica?',o:['El mar está más profundo','La arena es más oscura y absorbe más','El agua tiene calor específico mucho más alto que la arena','La arena tiene contacto con el suelo caliente'],a:2,f:'El calor específico del agua es mucho mayor que el de la arena. Con el mismo calor solar, la arena sube mucho más de temperatura.'},
{c:'Los ríos del norte de Santander moderan el clima de las zonas cercanas.',q:'¿Qué propiedad del agua lo explica?',o:['La transparencia del agua','El alto calor específico — absorbe calor en épocas cálidas y lo libera en épocas frías','La convección constante del agua','La reflexión de la radiación solar'],a:1,f:'El alto calor específico del agua hace que los ríos y lagos absorban y liberen calor gradualmente, moderando los extremos de temperatura de la región.'},
{c:'Un pocillo de metal y uno de cerámica tienen el mismo café a 90°C.',q:'¿Cuál se enfría más rápido?',o:['El de cerámica','El de metal — mayor conductividad, cede calor al ambiente más rápido','Los dos igual','El de metal solo si está sobre superficie fría'],a:1,f:'El metal tiene mayor conductividad térmica que la cerámica. El café en pocillo de metal transfiere su calor al ambiente más rápidamente.'},
{c:'¿Por qué el cuerpo humano, siendo 60% agua, mantiene una temperatura tan estable?',o:['Porque la piel aísla perfectamente','El alto calor específico del agua — el cuerpo puede acumular o perder mucho calor sin grandes cambios de temperatura','Porque el corazón genera calor constante que compensa','Porque los músculos producen exactamente el calor que se pierde'],a:1,f:'El alto calor específico del agua hace que el cuerpo sea muy resistente a los cambios de temperatura — puede acumular o liberar grandes cantidades de calor con pocos cambios de temperatura.'},
]},
cp3:{sci:'bla',qs:[
{c:'Dos cuerpos a diferente temperatura se ponen en contacto.',q:'¿Cuándo se detiene el intercambio de calor?',o:['Cuando el cuerpo frío absorbió toda la energía posible','Cuando ambos alcanzan la misma temperatura — equilibrio térmico','Cuando el cuerpo caliente se queda sin energía','Después de 5 minutos de contacto siempre'],a:1,f:'El intercambio se detiene cuando ambos alcanzan la misma temperatura. Sin diferencia de temperatura, no hay flujo de calor.'},
{c:'Se mezclan 200 ml de agua a 70°C con 200 ml de agua a 10°C en recipiente aislado.',q:'¿Cuál es la temperatura de equilibrio?',o:['70°C','10°C','40°C — el promedio de las dos temperaturas','55°C'],a:2,f:'Con masas iguales del mismo material: T_eq = (70+10)/2 = 40°C.'},
{c:'¿Por qué hay que esperar 3 minutos después de poner el termómetro bajo el brazo?',o:['El mercurio necesita ese tiempo para reaccionar con el calor','Para alcanzar el equilibrio térmico con el cuerpo — solo en ese punto la lectura es exacta','Los termómetros necesitan calibración de 3 minutos','El cuerpo necesita estabilizar su temperatura primero'],a:1,f:'El termómetro y el cuerpo necesitan tiempo para intercambiar calor hasta el equilibrio térmico. Antes de ese punto, el termómetro marca una temperatura intermedia, no la real del cuerpo.'},
{c:'Un vaso tiene hielo y agua a 0°C. ¿Cuándo subirá la temperatura?',o:['Nunca — el hielo mantiene siempre 0°C','Cuando todo el hielo se haya derretido completamente','Cuando el agua haya cedido todo su calor al hielo','Cuando el termómetro alcance equilibrio con el hielo'],a:1,f:'Mientras quede hielo, la temperatura es 0°C (punto de fusión del agua). Solo cuando el último cristal sea agua líquida, la temperatura puede subir.'},
{c:'¿Por qué el metal frío se siente más frío que la madera a la misma temperatura?',o:['El metal está realmente a menor temperatura','El metal extrae calor de la mano mucho más rápido — alta conductividad = pérdida veloz = se siente muy frío','La madera genera calor propio','El metal tiene mayor masa por volumen'],a:1,f:'Misma temperatura, diferente velocidad de extracción de calor. El metal conduce bien = saca calor rápido = parece muy frío. La madera conduce mal = saca calor despacio = parece tibio.'},
]},
cp4:{sci:'fou',qs:[
{c:'¿Por qué los mangos de las ollas son de madera o plástico, no de metal?',o:['Son más baratos','Son malos conductores — el calor tarda mucho en llegar del cuerpo de la olla al mango','El metal es muy pesado','El plástico resiste mejor las altas temperaturas'],a:1,f:'La madera y el plástico tienen muy baja conductividad térmica. El calor tarda mucho en llegar al mango por conducción.'},
{c:'Una persona junto a una fogata pone un cartón entre ella y el fuego. El calor disminuye.',q:'¿Qué mecanismo bloqueó el cartón?',o:['Conducción por el suelo','Convección del aire caliente','Radiación — el cartón bloqueó las ondas infrarrojas de la fogata','Equilibrio térmico directo'],a:2,f:'La persona recibía radiación infrarroja de la fogata. El cartón opaco bloquea esas ondas infrarrojas.'},
{c:'El agua de una olla se calienta sola sin revolverla.',q:'¿Qué mecanismo distribuye el calor en toda el agua?',o:['Conducción de molécula en molécula','Convección — el agua caliente del fondo sube y la fría baja, distribuyendo el calor','Radiación del fondo caliente','Los tres en igual proporción'],a:1,f:'Convección: el agua caliente del fondo sube (menos densa), la fría baja. Corrientes circulares distribuyen el calor uniformemente.'},
{c:'Los astronautas reciben calor del Sol a través del vacío del espacio.',q:'¿Qué mecanismo es el único que puede explicar esto?',o:['Conducción por partículas del espacio','Convección del viento solar','Radiación — ondas electromagnéticas que viajan por el vacío sin necesitar ningún material','Equilibrio térmico a distancia'],a:2,f:'Solo la radiación puede viajar por el vacío. El Sol emite ondas electromagnéticas que atraviesan 150 millones de km de vacío y calientan la estación espacial.'},
{c:'¿Por qué no funciona envolver al niño con fiebre en una manta gruesa para bajarle la temperatura?',o:['La manta no conduce el calor del niño al exterior','La manta es aislante — reduce la pérdida de calor del cuerpo al ambiente, manteniendo o aumentando la fiebre','La manta aumenta la convección alrededor del cuerpo','La manta bloquea la radiación corporal útil'],a:1,f:'La manta actúa como aislante — reduce la conducción y convección del calor del cuerpo hacia el ambiente. El cuerpo retiene su calor y la fiebre se mantiene o sube. Lo correcto es descubrir al niño.'},
]},
cp5:{sci:'amo',qs:[
{c:'Los cables eléctricos se instalan flojos en verano. En invierno se tensan solos.',q:'¿Qué explica el tensado en invierno?',o:['El peso del hielo y la nieve que se acumula','El metal se contrae con el frío — el cable se acorta. Si estuviera tenso al instalarlo, la contracción lo rompería','La electricidad genera calor que dilata los cables en verano','El viento los tensa en invierno'],a:1,f:'Contracción térmica: los metales se contraen al enfriarse. El cable se hace más corto en invierno. Si estuviera instalado tenso, esa contracción generaría fuerzas que podrían romperlo.'},
{c:'Una botella completamente llena de agua se congela y el vidrio se rompe.',q:'¿Por qué?',o:['El vidrio se contrae más rápido que el agua','El agua al congelarse se expande — sin espacio, la presión del hielo rompe el vidrio','El frío agrieta el vidrio','El aire dentro explota'],a:1,f:'Anomalía del agua: al congelarse se expande. Sin espacio, la presión del hielo rompe el vidrio.'},
{c:'La tapa metálica de un frasco está muy apretada.',q:'¿Por qué ponerla bajo agua caliente 10 segundos ayuda a abrirla?',o:['El agua caliente disuelve el adhesivo','El metal se dilata con el calor — el diámetro interior de la tapa aumenta levemente y la rosca se afloja','El calor ablanda el metal','El vapor crea presión dentro del frasco'],a:1,f:'Dilatación del metal: el diámetro interior de la tapa metálica aumenta ligeramente con el calor, lo suficiente para aflojar la rosca con el frasco de vidrio.'},
{c:'El pavimento sin juntas de dilatación se "abomba" en días muy calurosos.',q:'¿Qué tipo de dilatación y qué principio lo explican?',o:['Dilatación superficial — el asfalto crece en largo y ancho pero sin espacio lateral se deforma hacia arriba','Solo dilatación lineal en el sentido longitudinal','Dilatación volumétrica hacia abajo','La dilatación del suelo empuja el asfalto'],a:0,f:'Dilatación superficial: el asfalto absorbe calor solar y crece en largo y ancho. Sin juntas de dilatación para absorber esa expansión, el único lugar disponible es hacia arriba — se "abomba".'},
{c:'¿Por qué el hielo flota en el agua aunque casi todo lo demás se hunde al solidificarse?',o:['El hielo es hueco por dentro','Anomalía del agua: al congelarse el agua se expande y el hielo resulta menos denso que el agua líquida — menor densidad = flota','La tensión superficial del agua lo sostiene','El hielo flota solo en agua pura'],a:1,f:'Anomalía del agua: entre 0°C y 4°C el agua se contrae al calentarse (al contrario de casi todo). Esto hace que el hielo sea menos denso que el agua líquida — por eso flota.'},
]},
};

// CIERRE T1 — JOULE
CPQ.cpT1={sci:'jou',qs:[
{c:'Cuchara de metal y mango de madera en el mismo cajón a 22°C.',q:'¿Por qué el metal se siente más frío?',o:['El metal está a menor temperatura real','El metal extrae calor de la mano más rápido — la pérdida veloz se percibe como frío','La madera genera calor propio','El metal refleja el calor corporal'],a:1,f:'Misma temperatura, diferente conductividad. El metal conduce bien = saca calor rápido = parece frío.'},
{c:'El mar regula el clima de las ciudades costeras del Caribe colombiano.',q:'¿Qué propiedad del agua lo hace posible?',o:['La transparencia del agua','El alto calor específico — absorbe calor en verano y lo libera gradualmente en épocas frías','La convección constante del agua','La reflexión de la radiación solar'],a:1,f:'El alto calor específico del agua: necesita mucha energía para subir de temperatura y también libera mucha al enfriarse. Eso estabiliza el clima costero.'},
{c:'Se mezclan 500 ml de agua a 10°C con 500 ml de agua a 70°C en recipiente aislado.',q:'¿Cuál es la temperatura de equilibrio?',o:['70°C','10°C','40°C — el promedio de las dos temperaturas','55°C'],a:2,f:'Con masas iguales del mismo material: T_eq = (10+70)/2 = 40°C.'},
{c:'Los cables eléctricos entre postes se instalan deliberadamente flojos en verano.',q:'¿Por qué?',o:['Para que el viento los mueva sin romperlos','En invierno el cable se contrae — si estuviera tenso se rompería o derribaría el poste','Para reducir la resistencia eléctrica','Para facilitar el mantenimiento'],a:1,f:'Dilatación lineal: el cable se dilata en verano (flojo) y se contrae en invierno. Si estuviera tenso al instalar, la contracción invernal generaría fuerzas que lo podrían romper.'},
{c:'Al abrir el congelador, el aire frío cae al suelo del cuarto.',q:'¿Qué mecanismo explica este movimiento?',o:['Conducción del frío por el suelo','Convección — el aire frío es más denso y desciende; el caliente sube a reemplazarlo','Radiación del frío del congelador','Equilibrio térmico directo entre el congelador y el suelo'],a:1,f:'Convección: el aire frío tiene mayor densidad que el caliente. El más denso desciende. El aire caliente sube a reemplazarlo — corriente de convección.'},
{c:'Una lámina de metal al sol todo el día llega a 65°C. Otra igual, en la sombra, está a 25°C.',q:'¿Qué mecanismo llevó el calor al metal bajo el sol?',o:['Conducción por el suelo','Convección del viento caliente','Radiación solar — ondas que viajan por el espacio y llegan directamente al metal','Los tres en igual proporción'],a:2,f:'Radiación: el Sol emite ondas electromagnéticas que viajan por el vacío del espacio y calientan el metal directamente, sin necesitar contacto ni aire.'},
{c:'El Sol calienta la Tierra a través de 150 millones de km de vacío.',q:'¿Por qué conducción y convección no pueden explicar esto?',o:['Son demasiado lentas para esas distancias','La conducción necesita contacto y la convección necesita fluido — el vacío no tiene ninguno de los dos','Solo funcionan a temperaturas menores de 100°C','Solo actúan en la atmósfera terrestre'],a:1,f:'Conducción: requiere materia en contacto. Convección: requiere fluido que circule. El vacío no tiene ninguno. Solo la radiación puede propagarse por el vacío.'},
{c:'Una sartén de hierro vacía y una olla con 2 litros de agua reciben el mismo calor del fogón.',q:'¿Cuál alcanza mayor temperatura más rápido?',o:['La olla — tiene más masa','La sartén — el hierro tiene menor calor específico que el agua y sube más de temperatura con el mismo calor','Los dos a la misma velocidad','La olla si tiene tapa'],a:1,f:'El hierro tiene calor específico mucho menor que el agua. Con el mismo calor, el hierro sube mucho más de temperatura.'},
{c:'El hielo flota en el agua.',q:'¿Qué consecuencia importante tiene esto para los ecosistemas acuáticos?',o:['Ninguna — los peces pueden vivir en el hielo igual que en el agua','El hielo flotante crea una capa aislante que protege el agua de abajo — los seres vivos sobreviven el invierno bajo esa capa','El hielo en la superficie enfría más el agua de abajo','El hielo produce oxígeno que los peces necesitan'],a:1,f:'El hielo flota por la anomalía del agua. Esa capa aislante protege el agua líquida de abajo, donde los organismos acuáticos sobreviven el invierno.'},
{c:'Una persona tiene la mano en agua a 30°C. La mano está a 37°C.',q:'¿En qué dirección fluye el calor?',o:['Del agua al cuerpo — el agua absorbe el calor corporal porque está más fría','Del cuerpo al agua — el cuerpo (37°C) está más caliente que el agua (30°C)','En ambas direcciones simultáneamente','No fluye — la diferencia es muy pequeña'],a:1,f:'El calor SIEMPRE fluye del más caliente (cuerpo 37°C) al más frío (agua 30°C). El cuerpo cede calor al agua. Esa pérdida de calor se percibe como "frío".'},
]};

// CHECKPOINTS T2
CPQ.cp6={sci:'fah',qs:[
{c:'El agua hierve a diferente temperatura en Bogotá (2600 m) y Barranquilla (nivel del mar).',q:'¿Por qué esta diferencia?',o:['El agua de Bogotá tiene impurezas que cambian su punto de ebullición','La menor presión atmosférica en Bogotá hace que las moléculas necesiten menos energía para escapar al estado gaseoso','El frío de Bogotá requiere menos calor para hervir el agua','El agua tiene menor densidad a gran altitud'],a:1,f:'El punto de ebullición depende de la presión. A mayor altitud, menor presión. Las moléculas de agua escapan al estado gaseoso con menos energía — hierven a menor temperatura.'},
{c:'Un bloque de hielo a 0°C recibe calor constantemente.',q:'¿Cuánto tiempo permanece la temperatura en 0°C?',o:['Solo un instante al comenzar la fusión','Todo el tiempo que dura la fusión — hasta que el último cristal de hielo se convierta en agua','La temperatura sube gradualmente mientras el hielo se derrite','La temperatura baja de 0°C durante la fusión'],a:1,f:'Durante toda la fusión la temperatura permanece en 0°C. Toda la energía va al calor latente. Solo cuando no quede hielo, la temperatura puede subir.'},
{c:'El mercurio permanece líquido entre −39°C y 358°C.',q:'¿Por qué esto lo hace ideal para termómetros?',o:['Es el único metal líquido a temperatura ambiente','Permanece líquido en todo el rango de medición cotidiana y se dilata de manera muy constante y predecible','Tiene color plateado que facilita la lectura','Tiene alto calor específico que lo hace muy sensible'],a:1,f:'El mercurio cubre el rango de uso cotidiano y su coeficiente de dilatación es muy constante: cada grado produce el mismo aumento de volumen, lo que da lecturas precisas.'},
{c:'El alcohol etílico hierve a 78.5°C y el agua a 100°C. Se mezclan y calientan.',q:'¿Qué ocurre primero?',o:['El agua hierve primero','El alcohol se vaporiza primero — llega antes a su punto de ebullición (78.5°C)','Los dos hierven al mismo tiempo','Ninguno hierve — la mezcla tiene punto de ebullición diferente'],a:1,f:'El alcohol alcanza primero su punto de ebullición (78.5°C). Este es el principio de la destilación para separar alcohol del agua.'},
{c:'Durante un cambio de fase, ¿qué pasa con la temperatura si se sigue calentando?',o:['Sube más rápido que antes','Permanece constante — toda la energía va al calor latente, no a subir la temperatura','Baja porque el cambio de fase absorbe temperatura del entorno','Fluctúa alrededor del punto de cambio de fase'],a:1,f:'Durante cualquier cambio de fase la temperatura es constante. La energía va al calor latente — a cambiar el estado, no la temperatura.'},
]};
CPQ.cp7={sci:'cel',qs:[
{c:'El vapor de la olla y el agua hirviendo están a 100°C.',q:'¿Por qué el vapor quema más al contacto con la piel?',o:['El vapor se mueve más rápido y ejerce más presión','Al condensarse en la piel, el vapor libera el calor latente de vaporización — energía extra que el agua líquida no tiene','El vapor tiene mayor temperatura real','El vapor penetra más profundo en la piel'],a:1,f:'Calor latente: el vapor al condensarse libera la energía que acumuló durante la vaporización. El agua líquida a 100°C no tiene esa energía extra almacenada.'},
{c:'Las bolas de naftalina del ropero desaparecen sin dejar charco.',q:'¿Qué cambio de fase ocurre?',o:['Evaporación del naftaleno líquido incoloro','Sublimación — sólido pasa directamente a gas sin fase líquida','Fusión invisible seguida de evaporación','Condensación inversa'],a:1,f:'Sublimación: sólido a gas directamente, sin pasar por líquido. Por eso no hay charco.'},
{c:'¿Cuál es la diferencia principal entre evaporación y ebullición?',o:['Evaporación solo a 100°C, ebullición a cualquier temperatura','Evaporación en la superficie a cualquier temperatura; ebullición en toda la masa a la temperatura exacta de ebullición','La evaporación es más rápida que la ebullición','Solo el agua puede experimentar ebullición'],a:1,f:'Evaporación: superficie, cualquier temperatura, lenta, sin burbujas. Ebullición: toda la masa, temperatura específica, con burbujas visibles.'},
{c:'Gotitas de rocío aparecen en las plantas en madrugadas frías.',q:'¿Qué cambio de fase lo produjo?',o:['Fusión del hielo del ambiente','Condensación — el vapor del aire caliente pasó a líquido al tocar las superficies frías de las plantas','Precipitación de lluvia muy fina','Sublimación inversa del hielo'],a:1,f:'Condensación: el vapor (gas) del aire toca las superficies frías y pasa al estado líquido formando las gotitas de rocío.'},
{c:'El sudor refresca el cuerpo aunque el ambiente esté caliente.',q:'¿Por qué?',o:['El sudor es un líquido frío producido por las glándulas','Al evaporarse, el sudor absorbe calor latente de la piel — extrae energía del cuerpo y lo enfría','El sudor aumenta la conductividad de la piel','El movimiento del sudor crea convección que aleja el calor'],a:1,f:'Calor latente de vaporización: el sudor al evaporarse toma energía directamente de la piel. Esa extracción de energía enfría la superficie corporal.'},
]};
CPQ.cp8={sci:'kel',qs:[
{c:'La gráfica de calentamiento tiene una zona horizontal a 0°C.',q:'¿Qué ocurre en esa zona?',o:['El calor se acumula para luego subir más rápido','El hielo se funde — toda la energía va al calor latente y la temperatura permanece en 0°C','El termómetro tiene error','El agua alcanzó su temperatura mínima'],a:1,f:'La zona horizontal a 0°C es la fusión. Toda la energía va al calor latente de fusión. La temperatura no sube hasta que no quede hielo.'},
{c:'El tramo horizontal a 100°C en la gráfica es más largo que el de 0°C.',q:'¿Qué indica?',o:['El fogón pierde potencia a temperaturas altas','El calor latente de vaporización es mayor que el de fusión — más energía para vaporizar que para fundir','Hay más agua que hielo en el sistema','La temperatura de 100°C es más difícil de mantener'],a:1,f:'El calor latente de vaporización es ~7 veces mayor que el de fusión. Se necesita mucho más tiempo (más energía) para vaporizar toda el agua.'},
{c:'¿Qué representan los tramos inclinados en la gráfica de calentamiento?',o:['El fogón se apaga y enciende','Cambio de temperatura sin cambio de estado — la energía aumenta la agitación molecular','Dos estados coexistiendo','El sistema pierde calor al ambiente'],a:1,f:'Tramos inclinados = cambio de temperatura. La energía va a aumentar la agitación molecular — lo que se manifiesta como aumento de temperatura.'},
{c:'¿Cuántas veces permanece constante la temperatura al enfriar vapor desde 110°C hasta hielo a −5°C?',o:['Una sola vez — al congelarse el agua','Dos veces — condensación a 100°C y solidificación a 0°C','Tres veces — a 100°C, 50°C y 0°C','La temperatura nunca permanece constante al enfriar'],a:1,f:'Dos cambios de fase al enfriar: condensación a 100°C (gas→líquido) y solidificación a 0°C (líquido→sólido). En cada uno la temperatura es constante.'},
{c:'¿Por qué aunque el fogón esté al máximo el agua no supera 100°C mientras hierve?',o:['El fogón pierde potencia','Toda la energía del fogón va al calor latente de vaporización — a convertir agua en vapor, no a subir la temperatura','El agua no puede absorber más calor después de 100°C','El termómetro tiene límite de 100°C'],a:1,f:'La energía del fogón va al calor latente de vaporización, no a subir la temperatura. La temperatura permanece en 100°C hasta que no quede agua líquida.'},
]};
CPQ.cpT2={sci:'car',qs:[
{c:'El agua hierve a diferente temperatura según la altitud.',q:'¿Qué determina el punto de ebullición?',o:['La composición química del agua en cada ciudad','La presión atmosférica — mayor altitud = menor presión = menor punto de ebullición','La temperatura promedio de la ciudad','La velocidad de calentamiento del agua'],a:1,f:'El punto de ebullición depende de la presión. A mayor altitud, menor presión atmosférica, menor punto de ebullición.'},
{c:'En la gráfica de calentamiento del agua, ¿en cuáles etapas la temperatura NO cambia?',o:['Solo en la primera — cuando el hielo empieza a calentarse','En la fusión (0°C) y en la vaporización (100°C)','En las etapas 1, 3 y 5 — las inclinadas','En todas las etapas'],a:1,f:'La temperatura es constante durante los cambios de fase: fusión a 0°C y vaporización a 100°C. En esas etapas toda la energía va al calor latente.'},
{c:'El vapor a 100°C quema más que el agua a 100°C.',q:'¿Por qué si tienen la misma temperatura?',o:['El vapor tiene mayor presión','Al condensarse en la piel, el vapor libera el calor latente de vaporización — energía extra que el agua líquida no tiene','El vapor tiene mayor temperatura real','El vapor penetra más profundo'],a:1,f:'Calor latente: el vapor tiene energía "oculta" acumulada durante la vaporización. Al condensarse la libera sobre la piel. El agua líquida no la tiene.'},
{c:'Las bolas de naftalina desaparecen sin dejar charco.',q:'¿Qué cambio de fase ocurre?',o:['Evaporación del naftaleno líquido','Sublimación — sólido a gas directamente','Fusión invisible','Condensación inversa'],a:1,f:'Sublimación: sólido a gas directamente, sin fase líquida.'},
{c:'La ropa mojada se seca al sol a 25°C.',q:'¿Qué proceso la seca?',o:['Ebullición a baja temperatura','Evaporación — las moléculas de la superficie se escapan al aire a cualquier temperatura','Sublimación del agua','Vaporización instantánea por el sol'],a:1,f:'Evaporación: proceso de vaporización en la superficie del líquido que ocurre a cualquier temperatura.'},
{c:'El rocío aparece en las plantas en madrugadas frías.',q:'¿Qué cambio de fase lo produjo?',o:['Precipitación de lluvia fina','Condensación — el vapor del aire se convirtió en líquido al tocar superficies frías','Fusión del hielo atmosférico','Sublimación inversa del agua'],a:1,f:'Condensación: el vapor (gas) del aire toca superficies frías y pasa al estado líquido.'},
{c:'¿En cuál estado de la materia tienen mayor energía cinética las moléculas?',o:['Sólido — están más juntas','Líquido — tienen libertad de movimiento','Gas — moléculas muy separadas moviéndose libremente a alta velocidad','En todos los estados la energía es igual'],a:2,f:'En el estado gaseoso las moléculas se mueven libremente a alta velocidad — máxima energía cinética. Por eso la vaporización requiere tanta energía.'},
{c:'Al enfriar vapor desde 120°C hasta hielo a −10°C, ¿cuántas veces la temperatura permanece constante?',o:['Una — solo al congelarse','Dos — condensación (100°C) y solidificación (0°C)','Tres — a 100°C, 50°C y 0°C','Nunca — baja continuamente'],a:1,f:'Dos cambios de fase: condensación a 100°C (gas→líquido) y solidificación a 0°C (líquido→sólido). En cada uno la temperatura es constante por el calor latente.'},
{c:'¿Por qué la olla a presión cocina más rápido?',o:['La presión calienta el agua más rápido','La mayor presión eleva el punto de ebullición del agua — puede llegar a ~120°C antes de hervir y cocina más rápido','La tapa sellada evita la pérdida de calor latente','La presión comprime los alimentos haciéndolos más pequeños'],a:1,f:'Mayor presión = mayor punto de ebullición. El agua puede llegar a ~120°C sin hervir. A mayor temperatura de cocción, los procesos son más rápidos.'},
{c:'El tramo de vaporización en la gráfica es más largo que el de fusión.',q:'¿Qué indica sobre los calores latentes?',o:['El fogón pierde potencia a altas temperaturas','El calor latente de vaporización es mucho mayor que el de fusión — más energía para vaporizar que para fundir','Hay más agua que hielo','La temperatura de 100°C es más difícil de mantener'],a:1,f:'El calor latente de vaporización es ~7 veces mayor que el de fusión. Por eso el tramo horizontal a 100°C es mucho más largo en la gráfica.'},
]};

{c:'Se mezclan 300 ml de agua a 90°C con 300 ml de agua a 10°C en recipiente aislado.',q:'¿Cuál es la temperatura de equilibrio y qué principio físico la determina?',o:['90°C — el agua caliente siempre domina','50°C — con masas iguales del mismo material la temperatura de equilibrio es el promedio (equilibrio térmico)','10°C — el agua fría siempre domina','60°C — el agua caliente aporta más energía'],a:1,f:'Equilibrio térmico con masas iguales: T_eq = (90+10)/2 = 50°C.'},
{c:'Una sartén de hierro vacía y una olla con 2 litros de agua reciben el mismo calor del fogón.',q:'¿Cuál llega a mayor temperatura y por qué?',o:['La olla de agua — tiene más masa y absorbe más calor','La sartén — el hierro tiene menor calor específico y sube más de temperatura con el mismo calor','Las dos igual — mismo calor, mismo fogón','La sartén solo si es más pequeña en volumen'],a:1,f:'El hierro tiene calor específico mucho menor que el agua. Con el mismo calor, el hierro sube mucho más de temperatura.'},
{c:'Una botella completamente llena de agua se congela y el vidrio se rompe.',q:'¿Qué propiedad del agua explica la ruptura?',o:['El vidrio es frágil al frío','La anomalía del agua: al congelarse se expande y la presión del hielo rompe el vidrio','El cambio brusco de temperatura fractura el vidrio','El aire dentro del agua explota al congelarse'],a:1,f:'Anomalía del agua: al congelarse se expande (necesita más volumen). Sin espacio, la presión del hielo rompe el vidrio.'},

{c:'El vapor de la olla y el agua hirviendo están ambos a 100°C.',q:'¿Por qué el vapor quema mucho más al contacto con la piel?',o:['El vapor tiene mayor temperatura real','Al condensarse en la piel, el vapor libera el calor latente de vaporización acumulado — energía extra que el agua líquida no tiene','El vapor ejerce mayor presión sobre la piel','El vapor penetra más profundo en los tejidos'],a:1,f:'Calor latente: el vapor al condensarse libera la energía que acumuló durante la vaporización. El agua líquida a 100°C no tiene esa energía extra almacenada.'},
{c:'En una mañana fría: gotitas de rocío en las plantas, vidrio del carro empañado y niebla en la montaña.',q:'¿Qué cambio de fase es común a los tres fenómenos?',o:['Fusión del hielo del ambiente','Condensación — el vapor del aire caliente se convierte en líquido al tocar superficies o capas de aire frío','Evaporación del agua del suelo','Sublimación del hielo de la atmósfera'],a:1,f:'Los tres son condensación: el vapor (gas) del aire toca superficies frías (hojas, vidrio) o capas de aire frío (niebla) y pasa al estado líquido.'},
{c:'Las llantas tienen más presión a las 2 pm que a las 5 am. Los rieles del tren tienen juntas de separación.',q:'¿Qué fenómeno físico explica ambas situaciones?',o:['El desgaste mecánico por uso','La dilatación térmica — los materiales se expanden con el calor (gases mucho más que sólidos)','El aumento de masa con la temperatura','La contracción de los materiales con el calor'],a:1,f:'Dilatación térmica: todos los materiales se expanden al calentarse. Los gases (aire de llantas) se dilatan mucho más que los sólidos (rieles de tren).'},
{c:'El sudor refresca el cuerpo. La ropa mojada se seca al sol a 25°C.',q:'¿Qué proceso físico es común a los dos?',o:['Ebullición a baja temperatura','Evaporación — el agua en la superficie se vaporiza a cualquier temperatura, absorbiendo calor latente del entorno','Sublimación del agua','Condensación del vapor ambiente sobre la piel'],a:1,f:'Evaporación: en ambos casos el agua en la superficie se vaporiza a temperatura ambiente, absorbiendo calor latente. Del cuerpo en el sudor, del ambiente en la ropa.'},
{c:'En Bogotá (2600 m) la comida tarda más en cocinarse que en Barranquilla, aunque el agua hierva en los dos lugares.',q:'¿Por qué?',o:['El agua de Bogotá tiene más minerales que la endurecen','En Bogotá el agua hierve a ~92°C (menor presión) — a menor temperatura de cocción, los procesos de cocción son más lentos','El frío de Bogotá enfría la comida mientras se cocina','El agua de Bogotá tiene menor calor específico'],a:1,f:'El punto de ebullición en Bogotá es ~92°C (menor presión). A menor temperatura, los procesos físicos y químicos de la cocción son más lentos.'},
{c:'Un termómetro de mercurio se mete en agua caliente: el mercurio sube. Se mete en el congelador: el mercurio baja.',q:'¿Qué principio físico explica el comportamiento del mercurio?',o:['La presión del líquido empuja el mercurio','La dilatación y contracción térmica — el mercurio se dilata al calentarse y se contrae al enfriarse','El mercurio es magnético y reacciona a los campos del calor','El termómetro tiene un resorte interno que lo regula'],a:1,f:'Dilatación y contracción térmica: el mercurio se dilata al calentarse (sube en el tubo) y se contrae al enfriarse (baja). El tubo delgadísimo hace que pequeños cambios de volumen sean grandes cambios de altura visible.'},
]};

// ══ QUIZ ENGINE ══
const QST={};const qTmrs={};
function initQ(sid,rawQs,n,ul){
  const qs=shufQ(rawQs).slice(0,n);
  QST[sid]={qs,idx:0,sc:0,lv:ul?3:99,cor:0,ul};
  renderQ(sid);
}
function renderQ(sid){
  const st=QST[sid];
  const box=document.getElementById('qw-'+sid);
  if(!box)return;
  if(st.idx>=st.qs.length){showQR(sid);return;}
  const q=st.qs[st.idx];const L='ABCD';
  box.innerHTML=
    (st.ul?`<div class="qhud"><div class="qlv" id="qlv-${sid}">${[0,1,2].map(i=>`<span class="qlf${i>=st.lv?' x':''}">❤️</span>`).join('')}</div><div class="qsc">${st.sc} pts</div><div class="qtm" id="qtm-${sid}">⏱ 30s</div></div>`:'')
    +`<div class="qbox">
        <div class="qnum">Pregunta ${st.idx+1} de ${st.qs.length}</div>
        <div class="qctx">${q.c}</div>
        <div class="qt">${q.q}</div>
        <div class="qopts" id="qo-${sid}">${q.o.map((o,i)=>`<button class="qopt" onclick="ansQ('${sid}',${i})"><span class="ol">${L[i]}</span><span>${o}</span></button>`).join('')}</div>
        <div class="qfb" id="qfb-${sid}"></div>
        <button class="qnx" id="qnx-${sid}" onclick="nxQ('${sid}')">${st.idx<st.qs.length-1?'Siguiente →':'Ver resultado ✓'}</button>
      </div>`;
  if(st.ul)stQT(sid);
}
function stQT(sid){
  clearInterval(qTmrs[sid]);let t=30;
  const el=()=>document.getElementById('qtm-'+sid);
  if(el())el().className='qtm';
  qTmrs[sid]=setInterval(()=>{
    t--;if(!el())return;
    el().textContent='⏱ '+t+'s';
    if(t<=10){el().classList.add('hot');if(t>0)snd('tick');}
    if(t<=0){
      clearInterval(qTmrs[sid]);
      const st=QST[sid];const q=st.qs[st.idx];
      st.lv--;snd('bad');upQL(sid);
      document.querySelectorAll(`#qo-${sid} .qopt`).forEach((b,i)=>{b.disabled=true;if(i===q.a)b.classList.add('ok');});
      const fb=document.getElementById('qfb-'+sid);
      if(fb){fb.className='qfb on bad';fb.textContent='⏱ ¡Tiempo! '+q.f;}
      const nx=document.getElementById('qnx-'+sid);if(nx)nx.style.display='inline-block';
    }
  },1000);
}
function ansQ(sid,c){
  clearInterval(qTmrs[sid]);
  const st=QST[sid];const q=st.qs[st.idx];
  document.querySelectorAll(`#qo-${sid} .qopt`).forEach(b=>b.disabled=true);
  const btns=document.querySelectorAll(`#qo-${sid} .qopt`);
  if(c===q.a){btns[c].classList.add('ok');st.sc+=100;st.cor++;snd('ok');}
  else{btns[c].classList.add('bad');btns[q.a].classList.add('ok');if(st.ul)st.lv--;snd('bad');}
  if(st.ul)upQL(sid);
  const fb=document.getElementById('qfb-'+sid);
  fb.className='qfb on '+(c===q.a?'ok':'bad');
  fb.textContent=(c===q.a?'✅ ¡Correcto! ':'❌ Incorrecto. ')+(q.f||'');
  document.getElementById('qnx-'+sid).style.display='inline-block';
}
function upQL(sid){
  const el=document.getElementById('qlv-'+sid);if(!el)return;
  el.innerHTML=[0,1,2].map(i=>`<span class="qlf${i>=QST[sid].lv?' x':''}">❤️</span>`).join('');
}
function nxQ(sid){clearInterval(qTmrs[sid]);QST[sid].idx++;renderQ(sid);}
function showQR(sid){
  clearInterval(qTmrs[sid]);
  const st=QST[sid];const box=document.getElementById('qw-'+sid);if(!box)return;
  const ok=st.cor>=Math.ceil(st.qs.length*.6);
  snd(ok?'win':'lose');
  box.innerHTML=`<div class="qres">
    <div style="font-size:36px;">${st.cor===st.qs.length?'🌟':ok?'✅':'📖'}</div>
    <div class="big" style="color:${ok?'var(--gn)':'var(--f)'};">${st.cor} / ${st.qs.length}</div>
    <div class="msg">${ok?'¡Excelente! Dominas este tema.':'Repasa el contenido e inténtalo de nuevo.'}</div>
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:9px 0;">
      <div style="background:var(--cd);border:1px solid var(--br);border-radius:9px;padding:7px 12px;text-align:center;">
        <div style="font-size:16px;font-weight:800;">${st.sc}</div><div style="font-size:9px;color:var(--mu);">puntos</div>
      </div>
      ${st.ul?`<div style="background:var(--cd);border:1px solid var(--br);border-radius:9px;padding:7px 12px;text-align:center;"><div style="font-size:16px;font-weight:800;">${st.lv}</div><div style="font-size:9px;color:var(--mu);">vidas</div></div>`:''}
    </div>
    <button class="btnr" style="background:linear-gradient(135deg,var(--f),var(--f2));" onclick="initQ('${sid}',QST['${sid}'].qs,${st.qs.length},${st.ul})">🔄 Repetir</button>
    ${ok?`<button class="btnr" style="background:linear-gradient(135deg,var(--gn),#00a86b);" onclick="go(1)">Continuar →</button>`:''}
  </div>`;
}

function updGH(){

  if(e('glv'))e('glv').innerHTML=[0,1,2].map(i=>`<span class="qlf${i>=GS.lv?' x':''}">❤️</span>`).join('');
  if(e('gsc'))e('gsc').textContent=GS.s+' pts';
  if(e('gstr'))e('gstr').textContent='🔥 Racha: '+GS.k;
}
function renderGQ(){
  updGH();
  if(GS.i>=GS.qs.length||GS.lv<=0){showGR();return;}
  const q=GS.qs[GS.i];
  const gc=document.getElementById('gcnt');if(!gc)return;
  gc.innerHTML=`<div class="qnum">Pregunta ${GS.i+1} de ${GS.qs.length}</div>
    <div class="qctx">${q.c}</div>
    <div class="qt">${q.q}</div>
    <div class="qopts" id="go">${q.o.map((o,i)=>`<button class="qopt" onclick="ansG(${i})"><span class="ol">${'ABCD'[i]}</span><span>${o}</span></button>`).join('')}</div>
    <div class="qfb" id="gf"></div>
    <button class="qnx" id="gnx" style="display:none;" onclick="GS.i++;renderGQ()">Siguiente →</button>`;
  stGT();
}
function stGT(){
  clearInterval(GS.tm);let t=20;
  const el=()=>document.getElementById('gtm');
  if(el())el().className='qtm';
  GS.tm=setInterval(()=>{
    t--;if(!el())return;
    el().textContent='⏱ '+t+'s';
    if(t<=7){el().classList.add('hot');if(t>0)snd('tick');}
    if(t<=0){
      clearInterval(GS.tm);GS.lv--;GS.k=0;snd('bad');updGH();
      const q=GS.qs[GS.i];
      document.querySelectorAll('#go .qopt').forEach((b,i)=>{b.disabled=true;if(i===q.a)b.classList.add('ok');});
      const gf=document.getElementById('gf');if(gf){gf.className='qfb on bad';gf.textContent='⏱ ¡Tiempo!';}
      const gnx=document.getElementById('gnx');if(gnx)gnx.style.display='inline-block';
      if(GS.lv<=0)setTimeout(showGR,1200);
    }
  },1000);
}
function ansG(c){
  clearInterval(GS.tm);
  const q=GS.qs[GS.i];
  document.querySelectorAll('#go .qopt').forEach(b=>b.disabled=true);
  const btns=document.querySelectorAll('#go .qopt');
  if(c===q.a){btns[c].classList.add('ok');GS.k++;const bon=GS.k>=3?50:0;GS.s+=100+bon;snd('ok');}
  else{btns[c].classList.add('bad');btns[q.a].classList.add('ok');GS.lv--;GS.k=0;snd('bad');}
  updGH();
  const gf=document.getElementById('gf');
  if(gf){gf.className='qfb on '+(c===q.a?'ok':'bad');gf.textContent=c===q.a?'✅ ¡Correcto!'+(GS.k>=3?' 🔥 ¡Racha!':''):'❌ Incorrecto.';}
  const gnx=document.getElementById('gnx');if(gnx)gnx.style.display='inline-block';
}
function showGR(){
  clearInterval(GS.tm);const gc=document.getElementById('gcnt');if(!gc)return;
  const ok=GS.lv>0;snd(ok?'win':'lose');
  gc.innerHTML=`<div class="qres">
    <div style="font-size:42px;">${ok?'🏆':'💔'}</div>
    <div class="big" style="color:${ok?'var(--ye)':'var(--f)'};">${GS.s} pts</div>

      <div style="background:var(--cd);border:1px solid var(--br);border-radius:9px;padding:7px 12px;text-align:center;"><div style="font-size:16px;font-weight:800;">${GS.lv}</div><div style="font-size:9px;color:var(--mu);">vidas</div></div>

    <button class="btnr" style="background:linear-gradient(135deg,var(--f),var(--f2));" onclick="GS.rdy=false;initGame()">🔄 Jugar de nuevo</button>
  </div>`;
}

  const fb=document.getElementById('simf');
  fb.className='qfb on '+(c===q.a?'ok':'bad');
  fb.textContent=(c===q.a?'✅ Correcto · ':'❌ Incorrecto · ')+'Competencia: '+q.comp;
  document.getElementById('simnx').style.display='inline-block';
  snd(c===q.a?'ok':'bad');
}
function showSimR(){
  const ar=document.getElementById('smar');
  const total=SIM.ans.length,cor=SIM.ans.filter(a=>a.ok).length,pct=Math.round(cor/total*100);
  const byC={};SIM.ans.forEach(a=>{if(!byC[a.comp])byC[a.comp]={c:0,t:0};byC[a.comp].t++;if(a.ok)byC[a.comp].c++;});
  const lv=pct>=80?{l:'Nivel Avanzado',c:'var(--gn)',e:'¡Excelente dominio del tema!'}:pct>=60?{l:'Nivel Satisfactorio',c:'var(--ye)',e:'Buen desempeño. Refuerza donde fallaste.'}:{l:'Nivel Mínimo',c:'var(--f)',e:'Repasa el curso completo antes del ICFES.'};
  snd(pct>=60?'win':'lose');
  ar.innerHTML=`<div style="text-align:center;padding:12px 8px;">
    <div style="font-size:40px;margin-bottom:6px;">${pct>=80?'🏆':pct>=60?'🎯':'📚'}</div>
    <div style="font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;color:${lv.c};margin-bottom:3px;">${cor} / ${total} · ${pct}%</div>
    <div style="font-size:13px;font-weight:800;color:${lv.c};margin-bottom:5px;">${lv.l}</div>
    <div style="font-size:11px;color:var(--mu);margin-bottom:11px;">${lv.e}</div>
    <div style="display:flex;justify-content:center;gap:7px;flex-wrap:wrap;margin:9px 0;">
      ${Object.entries(byC).map(([comp,d])=>`
        <div style="background:var(--cd);border:1px solid var(--br);border-radius:10px;padding:8px 11px;min-width:120px;text-align:center;">
          <div style="font-size:9px;color:var(--mu);margin-bottom:2px;">${comp}</div>
          <div style="font-size:17px;font-weight:800;color:${d.c/d.t>=.6?'var(--gn)':'var(--f)'};">${d.c} / ${d.t}</div>
          <div style="font-size:9px;color:var(--mu);">${Math.round(d.c/d.t*100)}%</div>
        </div>`).join('')}
    </div>
    <button class="btnr" style="background:linear-gradient(135deg,var(--f),var(--f2));" onclick="startSim()">🔄 Repetir</button>
    <button class="btnr" style="background:linear-gradient(135deg,#0077B6,var(--ic));" onclick="goTo('s01')">📖 Inicio</button>
  </div>`;
}

// ══ NAVEGACIÓN ══
function buildSB(){
  let h='',lg='';
  SS.forEach((s,i)=>{
    if(s.gr!==lg){h+=`<div class="sbg">${s.gr}</div>`;lg=s.gr;}
    h+=`<div class="sbi${i===ci?' on':''}" id="sb${i}" onclick="gotoI(${i});cSB();">
      <span style="font-size:13px;width:18px;flex-shrink:0;">${s.ic}</span>
      <span style="flex:1;line-height:1.3;">${s.lb}</span>
      ${s.done?'<span class="sbck">✓</span>':''}
    </div>`;
  });
  document.getElementById('sbc').innerHTML=h;
}
function buildSC(){
  document.getElementById('scc').innerHTML=SS.map((s,i)=>
    `<div class="sc${i===0?' on':''}" id="sc${i}">${s.html}</div>`
  ).join('');
}
function gotoI(idx){
  if(idx<0||idx>=SS.length)return;
  document.getElementById('sc'+ci)?.classList.remove('on');
  ci=idx;
  document.getElementById('sc'+idx)?.classList.add('on');
  document.getElementById('sw').scrollTop=0;
  SS[idx].done=true;
  updNav();buildSB();updProg();
  if(SS[idx].fn)setTimeout(()=>SS[idx].fn(),80);
}
function go(d){gotoI(ci+d);}
function goTo(id){const i=SS.findIndex(s=>s.id===id);if(i>=0)gotoI(i);}
function updNav(){
  const s=SS[ci];
  document.getElementById('tbt').textContent='🔥 '+s.lb;
  document.getElementById('blb').textContent=(ci+1)+' / '+SS.length;
  document.getElementById('bpv').disabled=ci===0;
  const nb=document.getElementById('bnx');
  nb.disabled=ci===SS.length-1;
  nb.textContent=ci===SS.length-1?'✓ Completado':'Siguiente →';
}
function updProg(){
  const d=SS.filter(s=>s.done).length,p=Math.round(d/SS.length*100);
  document.getElementById('pi').style.width=p+'%';
  document.getElementById('ptx').textContent=p+'%';
}
function tSB(){document.getElementById('sb').classList.toggle('on');document.getElementById('ov').classList.toggle('on');}
function cSB(){document.getElementById('sb').classList.remove('on');document.getElementById('ov').classList.remove('on');}

// ══ INIT ══
buildSC();buildSB();updNav();updProg();SS[0].done=true;
</script>
</body>
</html>
